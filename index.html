<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ከወንድም በላይ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0c0c0e; 
            color: #f5f5f7; 
            text-align: center; 
            padding: 40px 20px;
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .container {
            max-width: 800px; 
            margin: 0 auto; 
            background: #16161a; 
            padding: 30px; 
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
            border: 1px solid #2a2a35; 
        }
        h1 { 
            color: #ff9800; 
            font-size: 2rem; 
            margin-bottom: 5px; 
        }
        h2 { 
            font-size: 1.1rem; 
            color: #8a8a9d; 
            font-weight: normal; 
            margin-bottom: 30px; 
        }
        .controls {
            margin-bottom: 30px; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
        }
        .btn {
            background: #ff9800; 
            border: none; 
            padding: 14px 35px; 
            font-size: 1.1rem;
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 30px;
            transition: all 0.2s ease; 
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3); 
        }
        .btn:hover {
            background: #ffa726; 
            transform: translateY(-2px); 
        }
        .btn-stop {
            background: #3a3a4a;
            color: #fff;
        }
        .btn-stop:hover {
            background: #4a4a5a;
        }
        .status-badge {
            background: #22222b; 
            padding: 8px 20px; 
            border-radius: 20px;
            font-size: 0.9rem; 
            color: #00e5ff; 
            display: inline-block; 
            margin-bottom: 25px; 
            border: 1px solid #1a8a9d; 
        }
        .section-title { 
            font-size: 1.3rem; 
            color: #00e5ff; 
            margin-top: 20px; 
            font-weight: bold; 
        }
        .lyric-box {
            font-size: 2rem; 
            margin: 20px 0; 
            min-height: 200px; 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center; 
            align-content: center;
            gap: 15px; 
            padding: 30px; 
            background: #1a1a24; 
            border-radius: 12px; 
            border: 1px solid #23232f; 
            line-height: 2;
        }
        /* Style for individual words */
        .word {
            color: #5a5a6e; 
            transition: all 0.15s ease; 
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            display: inline-block;
        }
        .word:hover {
            background: #2a2a35;
            color: #fff;
        }
        /* Glowing amber look when the specific word is being sung */
        .active-word { 
            color: #ff9800; 
            font-weight: bold; 
            text-shadow: 0 0 12px rgba(255,152,0,0.6); 
            transform: scale(1.1); 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ከወንድም በላይ (ታማኙ ወዳጅ)</h1>
        <h2>ምሳሌ 18፥24 • የኢትዮጵያ ፕሮቴስታንት 6/8 ወለባ መዝሙር</h2>
        
        <div class="controls">
            <button class="btn" id="playBtn">መዝሙሩን አጫውት (PLAY)</button>
            <button class="btn btn-stop" id="stopBtn">ቁም (STOP)</button>
        </div>
        
        <div class="status-badge" id="status">ቃል በቃል ማጫወቻ ዝግጁ ነው (Word Engine Ready)</div>
        <div class="section-title" id="sectionIndicator">ክፍል፦ ዝግጁ</div>
        
        <div class="lyric-box" id="lyricsContainer"></div>
    </div>

    <script>
        const audio = new Audio("mezmur.mp3");
        let isPlaying = false;

        // WORD-BY-WORD TIMELINE MAP
        // 'time' is the exact second that specific word drops in the audio file.
        const wordTimeline = [
            // INTRO
            { text: "(የሙዚቃ", time: 0.0, section: "መግቢያ (INTRO)" },
            { text: "መግቢያ...)", time: 2.0, section: "መግቢያ (INTRO)" },

            // VERSE 1
            { text: "የሰበሰብኳቸው…", time: 5.5, section: "ስንኝ 1 (VERSE 1)" },
            { text: "በዙሪያዬ", time: 7.5, section: "ስንኝ 1 (VERSE 1)" },
            { text: "የነበሩ፤", time: 9.0, section: "ስንኝ 1 (VERSE 1)" },
            
            { text: "በቀን", time: 11.0, section: "ስንኝ 1 (VERSE 1)" },
            { text: "መከራዬ…", time: 12.5, section: "ስንኝ 1 (VERSE 1)" },
            { text: "ፈጥነው", time: 14.5, section: "ስንኝ 1 (VERSE 1)" },
            { text: "ተበተኑ።", time: 16.0, section: "ስንኝ 1 (VERSE 1)" },
            
            { text: "ሰውማ", time: 18.5, section: "ስንኝ 1 (VERSE 1)" },
            { text: "ምንድነው…", time: 20.0, section: "ስንኝ 1 (VERSE 1)" },
            { text: "ዛሬ", time: 21.5, section: "ስንኝ 1 (VERSE 1)" },
            { text: "አጅቦ", time: 22.5, section: "ስንኝ 1 (VERSE 1)" },
            { text: "ነገ", time: 23.5, section: "ስንኝ 1 (VERSE 1)" },
            { text: "የሚጠፋ፤", time: 24.5, section: "ስንኝ 1 (VERSE 1)" },
            
            { text: "በምድር", time: 27.0, section: "ስንኝ 1 (VERSE 1)" },
            { text: "ወዳጅ", time: 28.5, section: "ስንኝ 1 (VERSE 1)" },
            { text: "ላይ…", time: 29.5, section: "ስንኝ 1 (VERSE 1)" },
            { text: "የጣለው", time: 31.0, section: "ስንኝ 1 (VERSE 1)" },
            { text: "ልቤ", time: 32.5, section: "ስንኝ 1 (VERSE 1)" },
            { text: "ተስፋ።", time: 33.5, section: "ስንኝ 1 (VERSE 1)" },

            // CHORUS
            { text: "ግን", time: 36.0, section: "አዝማች (CHORUS)" },
            { text: "ከወንድም", time: 37.0, section: "አዝማች (CHORUS)" },
            { text: "አብልጦ…", time: 38.5, section: "አዝማች (CHORUS)" },
            { text: "የሚጠጋጋኝ", time: 40.5, section: "አዝማች (CHORUS)" },
            { text: "አለ፤", time: 42.0, section: "አዝማች (CHORUS)" },
            
            { text: "በሞት", time: 44.0, section: "አዝማች (CHORUS)" },
            { text: "ጥላ", time: 45.0, section: "አዝማች (CHORUS)" },
            { text: "መካከል…", time: 46.2, section: "አዝማች (CHORUS)" },
            { text: "አብሮኝ", time: 48.0, section: "አዝማች (CHORUS)" },
            { text: "የቆመ", time: 49.5, section: "አዝማች (CHORUS)" },
            { text: "ወዳጅ", time: 51.0, section: "አዝማች (CHORUS)" },
            { text: "አለ!", time: 52.5, section: "አዝማች (CHORUS)" },
            
            { text: "እርሱማ", time: 55.0, section: "አዝማች (CHORUS)" },
            { text: "ኢየሱስ", time: 56.5, section: "አዝማች (CHORUS)" },
            { text: "ነው…", time: 58.0, section: "አዝማች (CHORUS)" },
            { text: "በምንም", time: 59.5, section: "አዝማች (CHORUS)" },
            { text: "የማይለየኝ፤", time: 61.5, section: "አዝማች (CHORUS)" },
            
            { text: "ሰው", time: 64.0, section: "አዝማች (CHORUS)" },
            { text: "ሁሉ", time: 65.0, section: "አዝማች (CHORUS)" },
            { text: "ሲተወኝ…", time: 66.2, section: "አዝማች (CHORUS)" },
            { text: "ደረቱ", time: 68.0, section: "አዝማች (CHORUS)" },
            { text: "ላይ", time: 69.2, section: "አዝማች (CHORUS)" },
            { text: "ያቀፈኝ።", time: 70.5, section: "አዝማች (CHORUS)" }
        ];

        const lyricsContainer = document.getElementById("lyricsContainer");
        const sectionIndicator = document.getElementById("sectionIndicator");
        const statusBadge = document.getElementById("status");

        // Generate individual interactive word spans on the dashboard
        function initializeWordEngine() {
            lyricsContainer.innerHTML = "";
            wordTimeline.forEach((item, index) => {
                const span = document.createElement("span");
                span.className = "word";
                span.id = `word-${index}`;
                span.innerText = item.text;
                
                // Clicking ANY word makes the audio jump directly to its playback timestamp!
                span.addEventListener("click", () => {
                    audio.currentTime = item.time;
                    if (!isPlaying) playSong();
                });

                lyricsContainer.appendChild(span);
            });
        }

        // Keep updating which specific word lights up as the audio plays
        audio.addEventListener("timeupdate", () => {
            const currentTime = audio.currentTime;
            let activeIndex = -1;

            // Find the current word based on audio progress
            for (let i = 0; i < wordTimeline.length; i++) {
                if (currentTime >= wordTimeline[i].time) {
                    activeIndex = i;
                }
            }

            if (activeIndex !== -1) {
                sectionIndicator.innerText = `ክፍል፦ ${wordTimeline[activeIndex].section}`;
                
                document.querySelectorAll(".word").forEach((el, index) => {
                    if (index === activeIndex) {
                        el.classList.add("active-word");
                    } else {
                        el.classList.remove("active-word");
                    }
                });
            }
        });

        function playSong() {
            audio.play().then(() => {
                isPlaying = true;
                statusBadge.innerText = "መዝሙሩ እየተጫወተ ነው (ቃል በቃል ማመሳሰል)";
                statusBadge.style.color = "#ff9800";
                statusBadge.style.borderColor = "#ff9800";
            }).catch(error => {
                statusBadge.innerText = "እባክዎ mezmur.mp3 በካታሎግዎ ውስጥ መኖሩን ያረጋግጡ";
            });
        }

        function stopSong() {
            audio.pause();
            audio.currentTime = 0;
            isPlaying = false;
            statusBadge.innerText = "የድምፅ ሞገዶች ቆመዋል (Engine Idle)";
            statusBadge.style.color = "#00e5ff";
            statusBadge.style.borderColor = "#1a8a9d";
            sectionIndicator.innerText = "ክፍል፦ ዝግጁ";
            document.querySelectorAll(".word").forEach(el => el.classList.remove("active-word"));
        }

        document.getElementById("playBtn").addEventListener("click", playSong);
        document.getElementById("stopBtn").addEventListener("click", stopSong);
        
        initializeWordEngine();
    </script>
</body>
</html>

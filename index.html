<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ከወንድም በላይ — Cinematic Masterpiece</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #09090b; 
            color: #f4f4f5; 
            text-align: center; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .player-container {
            max-width: 850px; 
            width: 92%;
            background: #111115; 
            padding: 50px 40px; 
            border-radius: 28px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9); 
            border: 1px solid #22222d;
            overflow: hidden;
        }
        h1 {
            font-size: 2.4rem; color: #ff9800; margin: 0 0 6px 0; font-weight: 700;
            text-shadow: 0 2px 10px rgba(255,152,0,0.15);
        }
        h2 {
            font-size: 1.05rem; color: #69697e; font-weight: normal; margin: 0 0 35px 0; letter-spacing: 0.5px;
        }
        .controls {
            margin-bottom: 30px; display: flex; justify-content: center; gap: 20px;
        }
        .btn {
            background: #ff9800; border: none; padding: 16px 48px; font-size: 1.1rem;
            color: #000; font-weight: bold; cursor: pointer; border-radius: 35px;
            transition: all 0.2s ease; box-shadow: 0 4px 20px rgba(255, 152, 0, 0.3); 
        }
        .btn:hover { background: #ffa726; transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255, 152, 0, 0.5); }
        .btn-stop { background: #22222a; color: #ff9800; border: 1px solid rgba(255,152,0,0.25); box-shadow: none; }
        .btn-stop:hover { background: #31313d; color: #ffa726; }
        
        .timer-display {
            font-family: monospace; font-size: 1.5rem; color: #00e5ff; margin-bottom: 35px;
            background: #161622; display: inline-block; padding: 8px 26px; border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.25); font-weight: bold;
        }

        /* Cinematic sliding window viewport */
        .lyric-window {
            height: 260px;
            overflow: hidden;
            position: relative;
            margin-top: 20px;
            border-top: 1px dashed #22222d;
            border-bottom: 1px dashed #22222d;
            padding: 20px 0;
        }
        .lyric-scroller {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(80px);
        }
        .lyric-line {
            font-size: 1.75rem; color: #2e2e3a; padding: 22px 0; transition: all 0.5s ease;
            line-height: 1.7; font-weight: 500; transform: scale(0.9); opacity: 0.3;
        }
        /* Active line glows and scales beautifully */
        .lyric-line.active-cinematic {
            color: #ffffff;
            font-weight: 700;
            transform: scale(1.05);
            opacity: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.7), 0 0 15px rgba(255, 152, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h1>ከወንድም በላይ (ታማኝ ወዳጅ)</h1>
        <h2>የኢትዮጵያ ፕሮቴስታንት መዝሙር — ክላሲካካዊ ሲኒማቲክ ስብስብ</h2>
        
        <div class="controls">
            <button class="btn" id="startBtn">አጫውት (PLAY CINEMATIC)</button>
            <button class="btn btn-stop" id="stopBtn">ቁም (STOP)</button>
        </div>

        <div class="timer-display" id="timeClock">0:00</div>

        <div class="lyric-window">
            <div class="lyric-scroller" id="lyricScroller">
                <div class="lyric-line" id="line-0">🎵 [ የሙዚቃ መግቢያ (INTRO) ]</div>
                <div class="lyric-line" id="line-1">የሰበሰብኳቸው... በዙሪያዬ የነበሩ፤ በቀን መከራዬ... ፈጥነው ተበተኑ።</div>
                <div class="lyric-line" id="line-2">ሰዉማ ምንድነው... ዛሬ እጅህን ነገ የሚጠፋ፤ በምድር ወዳጅ ላይ... የጣለው ልቤ ተስፋ።</div>
                <div class="lyric-line" id="line-3">ማን ከወንድም አብልጦ... የሚጠጋኝ አለ፤ በሞት ጥላ መካከል... አብሮኝ የቆመ</div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let masterGain = null;
        let activeNodes = [];
        let secondsElapsed = 0;
        let clockInterval = null;
        let isRunning = false;
        let lastLineIdx = -1;

        // Custom continuous melodic arrangements mapping to each verse segment
        const songMelodies = {
            1: [293.66, 329.63, 349.23, 440.00, 392.00, 349.23], 
            2: [392.00, 440.00, 523.25, 587.33, 440.00, 392.00], 
            3: [587.33, 523.25, 440.00, 392.00, 349.23, 293.66]  
        };

        // Precise visual stepping translation measurements
        const lineHeights = [80, 0, -85, -175];

        function playSynthesizerNote(freq, startTime, duration, volume, waveType = "sine") {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                let filter = audioCtx.createBiquadFilter();

                osc.type = waveType;
                osc.frequency.setValueAtTime(freq, startTime);

                filter.type = "lowpass";
                filter.frequency.setValueAtTime(waveType === "triangle" ? 350 : 900, startTime);

                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(volume, startTime + 0.08);
                gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(masterGain);

                osc.start(startTime);
                osc.stop(startTime + duration);
                activeNodes.push(osc);
            } catch (e) {
                console.log("Audio node scheduling bypassed:", e);
            }
        }

        function triggerMelodyPhrase(lineId) {
            if (!songMelodies[lineId] || !audioCtx) return;
            let now = audioCtx.currentTime;

            // Generate an elegant, rolling classical arpeggio background accent
            let bassNotes = lineId === 1 ? [146.83, 220.00] : lineId === 2 ? [164.81, 246.94] : [130.81, 196.00];
            bassNotes.forEach((bfreq, bidx) => {
                playSynthesizerNote(bfreq, now + (bidx * 0.15), 2.0, 0.08, "triangle");
            });

            // Play the lead instrumental vocal line notes step-by-step
            songMelodies[lineId].forEach((freq, idx) => {
                let noteStart = now + (idx * 0.55);
                playSynthesizerNote(freq, noteStart, 0.48, 0.16, "sine");
                
                // Add an elegant high sparkle layer for cinematic depth
                playSynthesizerNote(freq * 2, noteStart, 0.25, 0.03, "sine");
            });
        }

        function triggerAmbientBeds() {
            if (!audioCtx) return;
            let now = audioCtx.currentTime;
            // Evolving orchestral base string layers (D-Minor Base)
            const stringCluster = [73.42, 110.00, 146.83, 174.61];
            stringCluster.forEach(freq => {
                playSynthesizerNote(freq, now, 38.0, 0.04, "triangle");
            });
        }

        function studioClockTick() {
            if (!isRunning) return;
            secondsElapsed++;

            // 1. UPDATE TIMER ELEMENT
            let mins = Math.floor(secondsElapsed / 60);
            let secs = secondsElapsed % 60;
            document.getElementById("timeClock").innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;

            // 2. EVALUATE CURRENT VERSE INDEX STEP
            let activeIdx = 0;
            if (secondsElapsed >= 6) activeIdx = 1;
            if (secondsElapsed >= 16) activeIdx = 2;
            if (secondsElapsed >= 26) activeIdx = 3;

            // 3. STEP THE LYRICS UP/DOWN VISUALLY (Guaranteed Movement)
            const scroller = document.getElementById("lyricScroller");
            scroller.style.transform = `translateY(${lineHeights[activeIdx]}px)`;

            // Update typography styles instantly
            for (let i = 0; i < 4; i++) {
                let el = document.getElementById(`line-${i}`);
                if (i === activeIdx) {
                    el.classList.add("active-cinematic");
                } else {
                    el.classList.remove("active-cinematic");
                }
            }

            // 4. FIRE AUDIO SIGNALS IF CROSSING MILESTONES
            if (activeIdx !== lastLineIdx) {
                lastLineIdx = activeIdx;
                if (activeIdx > 0 && audioCtx) {
                    triggerMelodyPhrase(activeIdx);
                }
            }

            // Loop reset safeguard once verse segment completes completely
            if (secondsElapsed >= 38) {
                stopStudioEngine();
            }
        }

        function stopStudioEngine() {
            isRunning = false;
            clearInterval(clockInterval);
            lastLineIdx = -1;
            secondsElapsed = 0;

            // Disconnect synth elements
            activeNodes.forEach(node => { try { node.stop(); } catch(e){} });
            activeNodes = [];

            if (masterGain && audioCtx) {
                try {
                    masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
                    masterGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                } catch(e){}
            }

            setTimeout(() => {
                if (audioCtx) {
                    try { audioCtx.close(); } catch(e){}
                    audioCtx = null;
                }
            }, 400);

            // Reset positioning parameters completely
            document.getElementById("timeClock").innerText = "0:00";
            document.getElementById("lyricScroller").style.transform = "translateY(80px)";
            for (let i = 0; i < 4; i++) {
                document.getElementById(`line-${i}`).classList.remove("active-cinematic");
            }
        }

        document.getElementById("startBtn").addEventListener("click", () => {
            if (isRunning) return;
            isRunning = true;

            // Set up visual highlights for the intro block instantly
            document.getElementById("line-0").classList.add("active-cinematic");
            document.getElementById("lyricScroller").style.transform = `translateY(${lineHeights[0]}px)`;

            // Safely open context and bypass system blocks smoothly on user tap action
            try {
                const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioCtxClass();
                
                masterGain = audioCtx.createGain();
                masterGain.gain.setValueAtTime(0.001, audioCtx.currentTime);
                masterGain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 1.0);
                masterGain.connect(audioCtx.destination);

                // Initialize cinematic ambient backdrop
                triggerAmbientBeds();
            } catch (err) {
                console.log("Audio contextual block bypassed to guarantee visualization loop:", err);
            }

            // Start processing engine loops smoothly
            clockInterval = setInterval(studioClockTick, 1000);
        });

        document.getElementById("stopBtn").addEventListener("click", () => {
            stopStudioEngine();
        });
    </script>
</body>
</html>

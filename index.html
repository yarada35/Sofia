<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ይቅር ስላልከኝ ነው እኔ መቆሜ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0c0c0e; 
            color: #f5f5f7; 
            text-align: center; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            max-width: 650px; 
            width: 90%;
            background: #16161a; 
            padding: 50px 30px; 
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            border: 1px solid #2a2a35; 
        }
        .audio-visual {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #ff9800;
            display: inline-block;
        }
        h1 {
            font-size: 2.2rem;
            color: #ffffff;
            margin: 0 0 10px 0;
        }
        h2 {
            font-size: 1.1rem;
            color: #8a8a9d;
            font-weight: normal;
            margin: 0 0 40px 0;
        }
        .controls {
            margin-bottom: 45px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn {
            background: #ff9800; border: none; padding: 14px 45px; font-size: 1.15rem;
            color: #000; font-weight: bold; cursor: pointer; border-radius: 30px;
            transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3); 
        }
        .btn:hover { background: #ffa726; transform: translateY(-2px); }
        .btn-stop { background: #3a3a4a; color: #fff; box-shadow: none; }
        .btn-stop:hover { background: #4e4e64; }
        
        .lyrics-container {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .lyric-line {
            font-size: 1.9rem;
            color: #3e3e4d;
            transition: all 0.3s ease;
            line-height: 1.6;
            font-weight: 500;
        }
        /* This active style triggers precisely at your custom timestamps */
        .active-vocal {
            color: #ff9800;
            font-weight: bold;
            transform: scale(1.04);
            text-shadow: 0 0 20px rgba(255, 152, 0, 0.5);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="audio-visual" id="vocalIcon">🎵</div>
        <h1>ይቅር ስላልከኝ ነው እኔ መቆሜ</h1>
        <h2>የኢትዮጵያ ፕሮቴስታንት መዝሙር</h2>
        
        <div class="controls">
            <button class="btn" id="playBtn">አጫውት (PLAY)</button>
            <button class="btn btn-stop" id="stopBtn">ቁም (STOP)</button>
        </div>

        <div class="lyrics-container">
            <div class="lyric-line" id="line-0">🎵 [ የሙዚቃ መግቢያ (Music Intro) ]</div>
            <div class="lyric-line" id="line-1">ይቅር ስላልከኝ ነው እኔ መቆሜ</div>
            <div class="lyric-line" id="line-2">ደግሞ እንዳልፈርድ እርዳኝ</div>
            <div class="lyric-line" id="line-3">ደግሞ እንዳልፈርድ እርዳኝ</div>
            <div class="lyric-line" id="line-4">በሰዎች ድካም</div>
        </div>
    </div>

    <script>
        const audio = new Audio("mezmur.mp3");
        const playBtn = document.getElementById("playBtn");
        const stopBtn = document.getElementById("stopBtn");
        const vocalIcon = document.getElementById("vocalIcon");

        // Fixed timeline matching your exact stamps from image_89e9ed.png
        const timeline = [
            { time: 0, index: 0 },
            { time: 4, index: 1 },
            { time: 9, index: 2 },
            { time: 14, index: 3 },
            { time: 19, index: 4 }
        ];

        playBtn.addEventListener("click", () => {
            audio.play();
            vocalIcon.style.animation = "pulse 0.8s infinite alternate";
        });

        stopBtn.addEventListener("click", () => {
            audio.pause();
            audio.currentTime = 0;
            vocalIcon.style.animation = "none";
            clearHighlights();
        });

        function clearHighlights() {
            for (let i = 0; i < 5; i++) {
                document.getElementById(`line-${i}`).classList.remove("active-vocal");
            }
        }

        audio.addEventListener("timeupdate", () => {
            let currentIdx = 0;
            for (let i = 0; i < timeline.length; i++) {
                if (audio.currentTime >= timeline[i].time) {
                    currentIdx = timeline[i].index;
                }
            }

            for (let i = 0; i < 5; i++) {
                const el = document.getElementById(`line-${i}`);
                if (i === currentIdx && !audio.paused) {
                    el.classList.add("active-vocal");
                } else {
                    el.classList.remove("active-vocal");
                }
            }
        });

        audio.addEventListener("ended", () => {
            vocalIcon.style.animation = "none";
            clearHighlights();
        });
    </script>
</body>
</html>

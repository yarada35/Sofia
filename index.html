<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ከወንድም በላይ — Cinematic Choir Master</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #09090d; 
            color: #f5f5f7; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: #0f0f15; 
            padding: 45px 35px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7); 
            border: 1px solid #1f1f2e; 
        }
        h1 { color: #ff9800; font-size: 2.2rem; margin: 0 0 8px 0; font-weight: 700; }
        h2 { font-size: 1.05rem; color: #71718a; font-weight: normal; margin: 0 0 35px 0; }
        .controls { margin-bottom: 35px; display: flex; justify-content: center; gap: 20px; }

        .btn { 
            background: #ff9800; border: none; padding: 16px 50px; 
            font-size: 1.15rem; color: #000; font-weight: bold; cursor: pointer; 
            border-radius: 35px; transition: all 0.2s ease; 
            box-shadow: 0 4px 20px rgba(255, 152, 0, 0.3); 
        }
        .btn:hover { background: #ffa726; transform: translateY(-2px); }
        .btn-stop { background: #1a1a26; color: #ff9800; border: 1px solid #2d2d42; box-shadow: none; }
        .btn-stop:hover { background: #252538; }
        
        .status-badge { 
            background: #09090d; padding: 10px 28px; border-radius: 25px; 
            font-size: 1rem; color: #00e5ff; display: inline-block; 
            margin-bottom: 30px; border: 1px solid rgba(0,229,255,0.15); font-family: monospace;
        }
        .section-title { 
            font-size: 1.35rem; color: #00e5ff; margin-top: 20px; 
            font-weight: bold; text-transform: uppercase; 
        }

        .lyric-box { 
            font-size: 2.2rem; margin: 30px 0; min-height: 180px; 
            display: flex; flex-wrap: wrap; justify-content: center; 
            align-content: center; gap: 14px; padding: 35px; 
            background: #14141f; border-radius: 20px; border: 1px solid #1f1f30; 
            line-height: 1.8;
        }
        .syllable { color: #4a4a68; transition: all 0.2s ease; }
        .active-syllable { 
            color: #ffffff; font-weight: bold; 
            text-shadow: 0 0 25px rgba(255,255,255,0.9), 0 0 10px #ff9800; 
            transform: scale(1.08); 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ከወንድም በላይ (ታማኙ ወዳጅ)</h1>
        <h2>ምሳሌ 18፥24 • የኢትዮጵያ ፕሮቴስታንት 6/8 ወለባ መዝሙር</h2>
        
        <div class="controls">
            <button class="btn" onclick="triggerStudioPlay()">መዝሙሩን አጫውት (PLAY CINEMATIC)</button>
            <button class="btn btn-stop" onclick="triggerStudioStop()">ቁም (STOP)</button>
        </div>
        
        <div class="status-badge" id="status">Studio Engine Ready • 0:00</div>
        <div class="section-title" id="sectionIndicator">ከፍል፦ መግቢያ (INTRO)</div>
        
        <div class="lyric-box" id="lyricsContainer">
            <span style="color: #626282; font-size: 1.6rem;">የመጫወቻውን ቁልፍ ሲጫኑ የክላሲካል ማቀናበሪያውና ዝማሬው ይጀምራል።</span>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let mainTimelineLoop = null;
        let isPlaying = false;
        let playbackTime = 0;
        let currentSectionIdx = 0;
        let currentSyllableIdx = -1;
        let sectionTimeElapsed = 0;

        // Tizita-infused Symphony Frequencies
        const PITCHES = {
            'C2': 65.41,  'G2': 98.00,  'A2': 110.00, 'F2': 87.31,
            'C3': 130.81, 'G3': 196.00, 'A3': 220.00, 'F3': 174.61,
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'G4': 392.00, 'A4': 440.00,
            'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'G5': 783.99, 'A5': 880.00
        };

        const songArrangement = {
            timeline: ["intro", "verse1", "verse2", "chorus"],
            progressions: { intro: 'C', verse1: 'C', verse2: 'F', chorus: 'Am' },
            chords: {
                'C':  { lowDrone: ['C2', 'C3'], strings: ['E4', 'G4', 'C5'] },
                'F':  { lowDrone: ['F2', 'F3'], strings: ['C4', 'F4', 'A4'] },
                'Am': { lowDrone: ['A2', 'A3'], strings: ['C4', 'E4', 'A4'] }
            },
            lyrics: {
                intro: [
                    { syllable: "🎵 [የክላሲካል ኦርኬስትራ መግቢያ...]", duration: 4.0, pitches: {} }
                ],
                verse1: [
                    { syllable: "የሰ", duration: 0.8, pitches: { leadVocal: 'E4' } },
                    { syllable: "በ", duration: 0.5, pitches: { leadVocal: 'G4' } },
                    { syllable: "ሰብ", duration: 0.5, pitches: { leadVocal: 'A4' } },
                    { syllable: "ኳ", duration: 0.8, pitches: { leadVocal: 'A4' } },
                    { syllable: "ቸው...", duration: 1.2, pitches: { leadVocal: 'G4' } },
                    { syllable: "በዙ", duration: 0.8, pitches: { leadVocal: 'E4' } },
                    { syllable: "ሪያ", duration: 0.6, pitches: { leadVocal: 'D4' } },
                    { syllable: "ዬ", duration: 0.6, pitches: { leadVocal: 'E4' } },
                    { syllable: "የነ", duration: 0.8, pitches: { leadVocal: 'G4' } },
                    { syllable: "በ", duration: 0.6, pitches: { leadVocal: 'D4' } },
                    { syllable: "ሩ፤", duration: 1.5, pitches: { leadVocal: 'C4' } },
                    { syllable: "በቀን", duration: 0.8, pitches: { leadVocal: 'E4' } },
                    { syllable: "መከ", duration: 0.8, pitches: { leadVocal: 'G4' } },
                    { syllable: "ራ", duration: 0.6, pitches: { leadVocal: 'A4' } },
                    { syllable: "ዬ...", duration: 1.2, pitches: { leadVocal: 'G4' } },
                    { syllable: "ፈጥ", duration: 0.6, pitches: { leadVocal: 'E4' } },
                    { syllable: "ነው", duration: 0.6, pitches: { leadVocal: 'D4' } },
                    { syllable: "ተበ", duration: 0.8, pitches: { leadVocal: 'D4' } },
                    { syllable: "ተ", duration: 0.6, pitches: { leadVocal: 'E4' } },
                    { syllable: "ኑ።", duration: 1.8, pitches: { leadVocal: 'C4' } }
                ],
                verse2: [
                    { syllable: "ሰው", duration: 0.8, pitches: { leadVocal: 'D4' } },
                    { syllable: "ማ", duration: 0.6, pitches: { leadVocal: 'F4' } },
                    { syllable: "ምንድ", duration: 0.6, pitches: { leadVocal: 'A4' } },
                    { syllable: "ነው...", duration: 1.2, pitches: { leadVocal: 'A4' } },
                    { syllable: "ዛሬ", duration: 0.8, pitches: { leadVocal: 'G4' } },
                    { syllable: "እጅ", duration: 0.6, pitches: { leadVocal: 'F4' } },
                    { syllable: "ህን", duration: 0.6, pitches: { leadVocal: 'D4' } },
                    { syllable: "ነገ", duration: 0.8, pitches: { leadVocal: 'F4' } },
                    { syllable: "የሚ", duration: 0.8, pitches: { leadVocal: 'G4' } },
                    { syllable: "ጠ", duration: 0.6, pitches: { leadVocal: 'F4' } },
                    { syllable: "ፋ፤", duration: 1.5, pitches: { leadVocal: 'D4' } }
                ],
                chorus: [
                    { syllable: "ግን", duration: 0.7, pitches: { leadVocal: 'A4', choirHarm: 'E4' } },
                    { syllable: "ከወን", duration: 0.7, pitches: { leadVocal: 'C5', choirHarm: 'G4' } },
                    { syllable: "ድም", duration: 0.7, pitches: { leadVocal: 'E5', choirHarm: 'C5' } },
                    { syllable: "አብ", duration: 0.7, pitches: { leadVocal: 'D5', choirHarm: 'B4' } },
                    { syllable: "ል", duration: 0.5, pitches: { leadVocal: 'C5', choirHarm: 'A4' } },
                    { syllable: "ጦ...", duration: 1.5, pitches: { leadVocal: 'G4', choirHarm: 'D4' } },
                    { syllable: "የሚ", duration: 0.8, pitches: { leadVocal: 'A4' } },
                    { syllable: "ጠ", duration: 0.6, pitches: { leadVocal: 'C5' } },
                    { syllable: "ጋ", duration: 0.6, pitches: { leadVocal: 'A4' } },
                    { syllable: "ወዳጅ", duration: 0.8, pitches: { leadVocal: 'G4' } },
                    { syllable: "አ", duration: 1.0, pitches: { leadVocal: 'E4' } },
                    { syllable: "ለ፤", duration: 1.8, pitches: { leadVocal: 'G4' } }
                ]
            }
        };

        // Cinematic Sound Generator - Lush slow attacking symphony bed
        function renderOrchestralPad(freq, startTime, duration, volume = 0.05) {
            if (!freq || !audioCtx) return;
            [-4, 0, 4].forEach((detuneVal) => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                let filter = audioCtx.createBiquadFilter();

                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(freq, startTime);
                osc.detune.setValueAtTime(detuneVal, startTime);

                filter.type = "lowpass";
                filter.frequency.setValueAtTime(420, startTime);

                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(volume / 3, startTime + 0.5); 
                gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

                osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                osc.start(startTime); osc.stop(startTime + duration);
            });
        }

        // Complete Human Vocal & Choir Engine (Formant Shifting Waves)
        function renderHumanVoiceSynth(freq, startTime, duration, volume = 0.18, formantType = "lead") {
            if (!freq || !audioCtx) return;
            let osc1 = audioCtx.createOscillator();
            let osc2 = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            
            osc1.type = "triangle";
            osc1.frequency.setValueAtTime(freq, startTime);
            osc2.type = "sawtooth";
            osc2.frequency.setValueAtTime(freq, startTime);
            osc2.detune.setValueAtTime(12, startTime); // Spreads vocal tone width

            // Vibrato LFO maps realistic singing cord modulations
            let lfo = audioCtx.createOscillator();
            let lfoGain = audioCtx.createGain();
            lfo.frequency.setValueAtTime(5.6, startTime); // Human vibrato speed 5.6Hz
            lfoGain.gain.setValueAtTime(2.2, startTime);
            lfo.connect(lfoGain); lfoGain.connect(osc1.frequency); lfoGain.connect(osc2.frequency);

            // Parallel Formant Filters shaping raw geometric waves into "Ah/Oh" vocal tones
            let formant1 = audioCtx.createBiquadFilter();
            formant1.type = "bandpass";
            formant1.frequency.setValueAtTime(formantType === "lead" ? 680 : 580, startTime);
            formant1.Q.setValueAtTime(6, startTime);

            let formant2 = audioCtx.createBiquadFilter();
            formant2.type = "bandpass";
            formant2.frequency.setValueAtTime(formantType === "lead" ? 1120 : 980, startTime);
            formant2.Q.setValueAtTime(5, startTime);

            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(volume, startTime + 0.06); 
            gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

            osc1.connect(formant1); osc2.connect(formant1);
            osc1.connect(formant2); osc2.connect(formant2);
            formant1.connect(gainNode); formant2.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            lfo.start(startTime); osc1.start(startTime); osc2.start(startTime);
            lfo.stop(startTime + duration); osc1.stop(startTime + duration); osc2.stop(startTime + duration);
        }

        function playChordBackground(progKey) {
            if (!audioCtx || !songArrangement.chords[progKey]) return;
            let now = audioCtx.currentTime;
            let chord = songArrangement.chords[progKey];

            chord.lowDrone.forEach(p => renderOrchestralPad(PITCHES[p], now, 3.8, 0.07));
            chord.strings.forEach(p => renderOrchestralPad(PITCHES[p], now, 3.8, 0.035));
        }

        function updateUIElement(id, text) {
            let el = document.getElementById(id);
            if (el) el.innerText = text;
        }

        function generateLyricLayout(sectionKey) {
            const container = document.getElementById("lyricsContainer");
            if (!container) return;
            container.innerHTML = "";
            
            songArrangement.lyrics[sectionKey].forEach((item, index) => {
                let span = document.createElement("span");
                span.className = "syllable";
                span.id = `syl-${index}`;
                span.innerText = item.syllable + " ";
                container.appendChild(span);
            });
        }

        function tickTimeline() {
            if (!isPlaying) return;

            playbackTime += 0.1;
            sectionTimeElapsed += 0.1;

            let mins = Math.floor(playbackTime / 60);
            let secs = Math.floor(playbackTime % 60);
            updateUIElement("status", `በማጫወት ላይ (CINEMATIC) • ${mins}:${secs < 10 ? '0' : ''}${secs}`);

            let sectionKey = songArrangement.timeline[currentSectionIdx];
            let currentProgression = songArrangement.progressions[sectionKey];

            if (sectionTimeElapsed <= 0.15 || Math.floor(sectionTimeElapsed * 10) % 35 === 0) {
                playChordBackground(currentProgression);
            }

            let syllables = songArrangement.lyrics[sectionKey];
            let timeAccumulator = 0;
            let targetSyllableIdx = -1;

            for (let i = 0; i < syllables.length; i++) {
                let start = timeAccumulator;
                let end = timeAccumulator + syllables[i].duration;
                if (sectionTimeElapsed >= start && sectionTimeElapsed < end) {
                    targetSyllableIdx = i;
                    break;
                }
                timeAccumulator += syllables[i].duration;
            }

            if (targetSyllableIdx !== -1 && targetSyllableIdx !== currentSyllableIdx) {
                let oldEl = document.getElementById(`syl-${currentSyllableIdx}`);
                if (oldEl) oldEl.classList.remove("active-syllable");

                currentSyllableIdx = targetSyllableIdx;
                let newEl = document.getElementById(`syl-${currentSyllableIdx}`);
                if (newEl) newEl.classList.add("active-syllable");

                let pitches = syllables[currentSyllableIdx].pitches;
                let now = audioCtx.currentTime;
                let dur = syllables[currentSyllableIdx].duration;

                if (pitches.leadVocal && PITCHES[pitches.leadVocal]) {
                    renderHumanVoiceSynth(PITCHES[pitches.leadVocal], now, dur * 0.94, 0.22, "lead");
                }
                if (pitches.choirHarm && PITCHES[pitches.choirHarm]) {
                    renderHumanVoiceSynth(PITCHES[pitches.choirHarm], now + 0.02, dur * 0.90, 0.10, "harmony");
                }
            }

            if (sectionTimeElapsed >= timeAccumulator) {
                currentSectionIdx++;
                sectionTimeElapsed = 0;
                currentSyllableIdx = -1;

                if (currentSectionIdx < songArrangement.timeline.length) {
                    let nextSection = songArrangement.timeline[currentSectionIdx];
                    updateUIElement("sectionIndicator", `ከፍል፦ ${nextSection.toUpperCase()}`);
                    generateLyricLayout(nextSection);
                } else {
                    triggerStudioStop();
                }
            }
        }

        // Global Exploded Trigger Scope — Immune to async browser delay lockups
        window.triggerStudioPlay = function() {
            if (isPlaying) return;
            isPlaying = true;

            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass();
                if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            } catch(e) {
                console.error("Audio Context initialization error", e);
            }

            let firstSection = songArrangement.timeline[0];
            updateUIElement("sectionIndicator", `ከፍል፦ ${firstSection.toUpperCase()}`);
            generateLyricLayout(firstSection);

            mainTimelineLoop = setInterval(tickTimeline, 100);
        };

        window.triggerStudioStop = function() {
            isPlaying = false;
            clearInterval(mainTimelineLoop);
            playbackTime = 0;
            currentSectionIdx = 0;
            currentSyllableIdx = -1;
            sectionTimeElapsed = 0;

            if (audioCtx) {
                try { audioCtx.close(); } catch(e){}
                audioCtx = null;
            }

            updateUIElement("status", "Studio Engine Ready • 0:00");
            updateUIElement("sectionIndicator", "ከፍል፦ መግቢያ (INTRO)");
            let container = document.getElementById("lyricsContainer");
            if (container) container.innerHTML = `<span style="color: #626282; font-size: 1.6rem;">የመጫወቻውን ቁልፍ ሲጫኑ የክላሲካል ማቀናበሪያውና ዝማሬው ይጀምራል።</span>`;
        };
    </script>
</body>
</html>

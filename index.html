<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ከወንድም በላይ — Cinematic Choir Master Composition</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #060608; 
            color: #f5f5f7; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: #0d0d12; 
            padding: 45px 35px; 
            border-radius: 28px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); 
            border: 1px solid #1f1f2a; 
        }
        h1 { color: #ff9800; font-size: 2.2rem; margin: 0 0 8px 0; font-weight: 700; }
        h2 { font-size: 1.05rem; color: #71718a; font-weight: normal; margin: 0 0 35px 0; }
        .controls { margin-bottom: 35px; display: flex; justify-content: center; gap: 20px; }

        .btn { 
            background: #ff9800; border: none; padding: 16px 50px; 
            font-size: 1.15rem; color: #000; font-weight: bold; cursor: pointer; 
            border-radius: 35px; transition: all 0.25s ease; 
            box-shadow: 0 4px 20px rgba(255, 152, 0, 0.3); 
        }
        .btn:hover { background: #ffa726; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 152, 0, 0.5); }
        .btn-stop { background: #1a1a24; color: #ff9800; border: 1px solid #2d2d3d; box-shadow: none; }
        .btn-stop:hover { background: #252533; color: #ffa726; }
        
        .status-badge { 
            background: #111118; padding: 10px 28px; border-radius: 25px; 
            font-size: 1rem; color: #00e5ff; display: inline-block; 
            margin-bottom: 30px; border: 1px solid rgba(0,229,255,0.2); font-family: monospace;
        }
        .section-title { 
            font-size: 1.35rem; color: #ff9800; margin-top: 20px; 
            font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; 
        }

        .lyric-box { 
            font-size: 2.4rem; margin: 30px 0; min-height: 160px; 
            display: flex; flex-wrap: wrap; justify-content: center; 
            align-content: center; gap: 16px; padding: 35px; 
            background: #12121a; border-radius: 20px; border: 1px solid #1c1c26; 
            line-height: 1.7;
        }
        .syllable { color: #3d3d52; transition: all 0.25s ease; cursor: default; }
        .active-syllable { 
            color: #ffffff; font-weight: bold; 
            text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 10px #ff9800; 
            transform: scale(1.12); 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ከወንድም በላይ (ታማኙ ወዳጅ)</h1>
        <h2>ምሳሌ 18፥24 • የኢትዮጵያ ፕሮቴስታንት 6/8 ወለባ መዝሙር</h2>
        
        <div class="controls">
            <button class="btn" id="playBtn">መዝሙሩን አጫውት (PLAY)</button>
            <button class="btn btn-stop" id="stopBtn">ቁም (STOP)</button>
        </div>
        
        <div class="status-badge" id="status">Engine Ready • 0:00</div>
        <div class="section-title" id="sectionIndicator">ከፍል፦ ዝግጁ (READY)</div>
        
        <div class="lyric-box" id="lyricsContainer">
            <span style="color: #5a5a6e; font-size: 1.5rem;">የመጫወቻ ቁልፉን ሲጫኑ ስንኞቹ እዚህ ይወጣሉ</span>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let mainTimelineLoop = null;
        let isPlaying = false;
        let playbackTime = 0;
        let currentSectionIdx = 0;
        let currentSyllableIdx = -1;
        let sectionTimeElapsed = 0;

        const PITCHES = {
            'C2': 65.41,  'G2': 98.00,  'A2': 110.00, 'F2': 87.31,
            'C3': 130.81, 'G3': 196.00, 'A3': 220.00, 'F3': 174.61,
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'G4': 392.00, 'A4': 440.00,
            'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'G5': 783.99, 'A5': 880.00
        };

        const songArrangement = {
            timeline: ["intro", "verse1", "chorus"],
            progressions: { intro: 'C', verse1: 'C', chorus: 'Am' },
            chords: {
                'C':  { lowDrone: ['C2', 'C3'], strings: ['E4', 'G4', 'C5'] },
                'Am': { lowDrone: ['A2', 'A3'], strings: ['C4', 'E4', 'A4'] }
            },
            lyrics: {
                intro: [
                    { syllable: "🎵 [የክላሲካል ኦርኬስትራ እና የዋሽንት መግቢያ...]", duration: 5.0, pitches: {} }
                ],
                verse1: [
                    { syllable: "የ", duration: 0.8, pitches: { leadVocal: 'E4' } },
                    { syllable: "ሰ", duration: 0.4, pitches: { leadVocal: 'G4' } },
                    { syllable: "በ", duration: 0.4, pitches: { leadVocal: 'A4' } },
                    { syllable: "ሰብ", duration: 0.8, pitches: { leadVocal: 'A4' } },
                    { syllable: "ኳ", duration: 0.8, pitches: { leadVocal: 'G4' } },
                    { syllable: "ቸ", duration: 0.8, pitches: { leadVocal: 'E4' } },
                    { syllable: "ው...", duration: 1.5, pitches: { leadVocal: 'D4' } },
                    { syllable: "በ", duration: 0.4, pitches: { leadVocal: 'D4' } },
                    { syllable: "ዙ", duration: 0.8, pitches: { leadVocal: 'E4' } },
                    { syllable: "ሪያ", duration: 0.8, pitches: { leadVocal: 'G4' } },
                    { syllable: "ዬ", duration: 1.5, pitches: { leadVocal: 'A4' } }
                ],
                chorus: [
                    { syllable: "ግን", duration: 0.6, pitches: { leadVocal: 'A4', choirHarm: 'E4' } },
                    { syllable: "ከ", duration: 0.4, pitches: { leadVocal: 'C5', choirHarm: 'G4' } },
                    { syllable: "ወን", duration: 0.8, pitches: { leadVocal: 'E5', choirHarm: 'C5' } },
                    { syllable: "ድም", duration: 0.8, pitches: { leadVocal: 'D5', choirHarm: 'B4' } },
                    { syllable: "አብ", duration: 0.8, pitches: { leadVocal: 'C5', choirHarm: 'A4' } },
                    { syllable: "ል", duration: 0.4, pitches: { leadVocal: 'A4', choirHarm: 'E4' } },
                    { syllable: "ጦ...", duration: 2.0, pitches: { leadVocal: 'G4', choirHarm: 'D4' } }
                ]
            }
        };

        function playCinematicOrchestraPad(freq, startTime, duration, volume = 0.04) {
            if (!freq || !audioCtx) return;
            const detunes = [-5, 0, 5];
            detunes.forEach((detuneVal) => {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                let filter = audioCtx.createBiquadFilter();

                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(freq, startTime);
                osc.detune.setValueAtTime(detuneVal, startTime);

                filter.type = "lowpass";
                filter.frequency.setValueAtTime(400, startTime);

                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(volume / 3, startTime + 0.6); 
                gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + duration);
            });
        }

        function playHumanVoiceSynth(freq, startTime, duration, volume = 0.18, formantType = "lead") {
            if (!freq || !audioCtx) return;
            let osc1 = audioCtx.createOscillator();
            let osc2 = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            
            osc1.type = "triangle";
            osc1.frequency.setValueAtTime(freq, startTime);
            
            osc2.type = "sawtooth";
            osc2.frequency.setValueAtTime(freq, startTime);
            osc2.detune.setValueAtTime(10, startTime);

            // Natural Vocal Vibrato (LFO)
            let vibrato = audioCtx.createOscillator();
            let vibratoGain = audioCtx.createGain();
            vibrato.frequency.setValueAtTime(5.5, startTime); 
            vibratoGain.gain.setValueAtTime(2.0, startTime); 
            vibrato.connect(vibratoGain);
            vibratoGain.connect(osc1.frequency);
            vibratoGain.connect(osc2.frequency);

            // Formant Filters for the "Ah/Oh" Human Vocal Cavity Emulation
            let f1 = audioCtx.createBiquadFilter();
            f1.type = "bandpass";
            f1.frequency.setValueAtTime(formantType === "lead" ? 650 : 550, startTime);
            f1.Q.setValueAtTime(5, startTime);

            let f2 = audioCtx.createBiquadFilter();
            f2.type = "bandpass";
            f2.frequency.setValueAtTime(formantType === "lead" ? 1100 : 950, startTime);
            f2.Q.setValueAtTime(4, startTime);

            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(volume, startTime + 0.05); 
            gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

            osc1.connect(f1); osc2.connect(f1);
            osc1.connect(f2); osc2.connect(f2);
            f1.connect(gainNode); f2.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            vibrato.start(startTime); osc1.start(startTime); osc2.start(startTime);
            vibrato.stop(startTime + duration); osc1.stop(startTime + duration); osc2.stop(startTime + duration);
        }

        function deployOrchestralScore(progressionKey) {
            if (!audioCtx || !songArrangement.chords[progressionKey]) return;
            let now = audioCtx.currentTime;
            let chord = songArrangement.chords[progressionKey];

            chord.lowDrone.forEach(p => { if(PITCHES[p]) playCinematicOrchestraPad(PITCHES[p], now, 4.0, 0.06); });
            chord.strings.forEach(p => { if(PITCHES[p]) playCinematicOrchestraPad(PITCHES[p], now, 4.0, 0.03); });
        }

        function safeUpdateDOM(id, property, value) {
            let el = document.getElementById(id);
            if (el) el[property] = value;
        }

        function buildSyllableInterface(sectionKey) {
            const container = document.getElementById("lyricsContainer");
            if (!container) return;
            container.innerHTML = "";
            let lyricsArray = songArrangement.lyrics[sectionKey];

            lyricsArray.forEach((item, index) => {
                let span = document.createElement("span");
                span.className = "syllable";
                span.id = `syl-${index}`;
                span.innerText = item.syllable + " ";
                container.appendChild(span);
            });
        }

        function processMasterTimelineTick() {
            if (!isPlaying) return;

            playbackTime += 0.1;
            sectionTimeElapsed += 0.1;

            let mins = Math.floor(playbackTime / 60);
            let secs = Math.floor(playbackTime % 60);
            safeUpdateDOM("status", "innerText", `በማጫወት ላይ • ${mins}:${secs < 10 ? '0' : ''}${secs}`);

            let sectionKey = songArrangement.timeline[currentSectionIdx];
            let currentProgression = songArrangement.progressions[sectionKey];

            if (sectionTimeElapsed <= 0.15 || Math.floor(sectionTimeElapsed * 10) % 35 === 0) {
                deployOrchestralScore(currentProgression);
            }

            let syllables = songArrangement.lyrics[sectionKey];
            let timeAccumulator = 0;
            let targetSyllableIdx = -1;

            for (let i = 0; i < syllables.length; i++) {
                let start = timeAccumulator;
                let end = timeAccumulator + syllables[i].duration;
                if (sectionTimeElapsed >= start && sectionTimeElapsed < end) {
                    targetSyllableIdx = i;
                    break;
                }
                timeAccumulator += syllables[i].duration;
            }

            if (targetSyllableIdx !== -1 && targetSyllableIdx !== currentSyllableIdx) {
                let oldEl = document.getElementById(`syl-${currentSyllableIdx}`);
                if (oldEl) oldEl.classList.remove("active-syllable");

                currentSyllableIdx = targetSyllableIdx;
                let newEl = document.getElementById(`syl-${currentSyllableIdx}`);
                if (newEl) newEl.classList.add("active-syllable");

                let pitches = syllables[currentSyllableIdx].pitches;
                let now = audioCtx.currentTime;
                let dur = syllables[currentSyllableIdx].duration;

                if (pitches.leadVocal && PITCHES[pitches.leadVocal]) {
                    playHumanVoiceSynth(PITCHES[pitches.leadVocal], now, dur * 0.95, 0.20, "lead");
                }
                if (pitches.choirHarm && PITCHES[pitches.choirHarm]) {
                    playHumanVoiceSynth(PITCHES[pitches.choirHarm], now + 0.02, dur * 0.92, 0.09, "harmony");
                }
            }

            if (sectionTimeElapsed >= timeAccumulator) {
                currentSectionIdx++;
                sectionTimeElapsed = 0;
                currentSyllableIdx = -1;

                if (currentSectionIdx < songArrangement.timeline.length) {
                    let nextSection = songArrangement.timeline[currentSectionIdx];
                    safeUpdateDOM("sectionIndicator", "innerText", `ከፍል፦ ${nextSection.toUpperCase()}`);
                    buildSyllableInterface(nextSection);
                } else {
                    shutdownStudioEngine();
                }
            }
        }

        function shutdownStudioEngine() {
            isPlaying = false;
            clearInterval(mainTimelineLoop);
            playbackTime = 0;
            currentSectionIdx = 0;
            currentSyllableIdx = -1;
            sectionTimeElapsed = 0;

            if (audioCtx) {
                try { audioCtx.close(); } catch(e){}
                audioCtx = null;
            }

            safeUpdateDOM("status", "innerText", `Engine Ready • 0:00`);
            safeUpdateDOM("sectionIndicator", "innerText", `ከፍል፦ ዝግጁ (READY)`);
            safeUpdateDOM("lyricsContainer", "innerHTML", `<span style="color: #5a5a6e; font-size: 1.5rem;">የመጫወቻ ቁልፉን ሲጫኑ ስንኞቹ እዚህ ይወጣሉ</span>`);
        }

        // Setup safe event bindings to completely prevent load crashes
        window.addEventListener("DOMContentLoaded", () => {
            let pBtn = document.getElementById("playBtn");
            let sBtn = document.getElementById("stopBtn");

            if (pBtn) {
                pBtn.addEventListener("click", () => {
                    if (isPlaying) return;
                    isPlaying = true;

                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContextClass();
                    if(audioCtx.state === 'suspended') { audioCtx.resume(); }

                    let firstSection = songArrangement.timeline[0];
                    safeUpdateDOM("sectionIndicator", "innerText", `ከፍል፦ ${firstSection.toUpperCase()}`);
                    buildSyllableInterface(firstSection);

                    mainTimelineLoop = setInterval(processMasterTimelineTick, 100);
                });
            }

            if (sBtn) {
                sBtn.addEventListener("click", shutdownStudioEngine);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ከወንድም በላይ (ታማኝ ወዳጅ) - Cinematic Player</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0a0a0c; 
            color: #f5f5f7; 
            text-align: center; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .player-container {
            max-width: 700px; 
            width: 90%;
            background: #111115; 
            padding: 50px 40px; 
            border-radius: 28px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); 
            border: 1px solid #22222b; 
            position: relative;
        }
        .glow-orb {
            position: absolute;
            top: -50px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(255, 152, 0, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0; pointer-events: none;
        }
        h1 {
            font-size: 2.4rem; color: #ff9800; margin: 0 0 5px 0; position: relative; z-index: 1;
        }
        h2 {
            font-size: 1.1rem; color: #717184; font-weight: normal; margin: 0 0 35px 0; position: relative; z-index: 1;
        }
        .controls {
            margin-bottom: 45px; display: flex; justify-content: center; gap: 20px; position: relative; z-index: 1;
        }
        .btn {
            background: #ff9800; border: none; padding: 15px 45px; font-size: 1.1rem;
            color: #000; font-weight: bold; cursor: pointer; border-radius: 30px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 20px rgba(255, 152, 0, 0.25); 
        }
        .btn:hover { background: #ffa726; transform: translateY(-3px); box-shadow: 0 6px 25px rgba(255, 152, 0, 0.4); }
        .btn-stop { background: #252530; color: #ff9800; border: 1px solid rgba(255,152,0,0.2); box-shadow: none; }
        .btn-stop:hover { background: #323242; color: #ffa726; }
        
        .timer-display {
            font-family: monospace; font-size: 1.2rem; color: #00e5ff; margin-bottom: 30px;
            background: #181822; display: inline-block; padding: 6px 18px; border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .lyrics-container {
            display: flex; flex-direction: column; gap: 32px; position: relative; z-index: 1;
        }
        .lyric-line {
            font-size: 1.75rem; color: #353545; transition: all 0.5s ease; line-height: 1.7; font-weight: 400;
        }
        /* Style when the generative cinematic voice reaches the timestamp */
        .active-cinematic {
            color: #ffffff;
            font-weight: bold;
            transform: scale(1.03);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 0 10px rgba(255, 152, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="glow-orb"></div>
        <h1>ከወንድም በላይ (ታማኝ ወዳጅ)</h1>
        <h2>የኢትዮጵያ ፕሮቴስታንት መዝሙር — ሉዓላዊ ሲኒማቲክ ስሪት</h2>
        
        <div class="controls">
            <button class="btn" id="startBtn">አጫውት (PLAY CINEMATIC)</button>
            <button class="btn btn-stop" id="stopBtn">ቁም (STOP)</button>
        </div>

        <div class="timer-display" id="timeClock">0:00</div>

        <div class="lyrics-container">
            <div class="lyric-line" id="line-0">🎵 [ የሙዚቃ መግቢያ (INTRO) ]</div>
            <div class="lyric-line" id="line-1">የሰበሰብኳቸው... በዙሪያዬ የነበሩ፤ በቀን መከራዬ... ፈጥነው ተበተኑ።</div>
            <div class="lyric-line" id="line-2">ሰዉማ ምንድነው... ዛሬ እጅህን ነገ የሚጠፋ፤ በምድር ወዳጅ ላይ... የጣለው ልቤ ተስፋ።</div>
            <div class="lyric-line" id="line-3">ማን ከወንድም አብልጦ... የሚጠጋኝ አለ፤ በሞት ጥላ መካከል... አብሮኝ የቆመ</div>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let oscillators = [];
        let biquadFilter = null;
        let masterGain = null;
        let startTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let spokenLines = new Set();

        // Exact timeline parameters extracted directly from image_be7bfa.png
        const timeline = [
            { id: 0, time: 0, text: "" },
            { id: 1, time: 6, text: "የሰበሰብኳቸው በዙሪያዬ የነበሩ በቀን መከራዬ ፈጥነው ተበተኑ" },
            { id: 2, time: 16, text: "ሰዉማ ምንድነው ዛሬ እጅህን ነገ የሚጠፋ በምድር ወዳጅ ላይ የጣለው ልቤ ተስፋ" },
            { id: 3, time: 26, text: "ማን ከወንድም አብልጦ የሚጠጋኝ አለ በሞት ጥላ መካከል አብሮኝ የቆመ" }
        ];

        function initCinematicEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            masterGain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 3); 

            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = "lowpass";
            biquadFilter.Q.value = 1;
            biquadFilter.frequency.setValueAtTime(250, audioCtx.currentTime);
            biquadFilter.frequency.linearRampToValueAtTime(450, audioCtx.currentTime + 10);

            // Generates a rich, resonant open-fifth cinematic minor cluster chord drone
            const frequencies = [73.42, 110.00, 146.83, 220.00, 293.66, 329.63]; 
            
            frequencies.forEach((freq, index) => {
                let osc = audioCtx.createOscillator();
                let oscGain = audioCtx.createGain();
                
                // Mix saw and triangle waveforms for a smooth cinematic string effect
                osc.type = index % 2 === 0 ? "sawtooth" : "triangle";
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                // Subtle detuning to make the acoustic field sound massive
                osc.detune.setValueAtTime((Math.random() * 8) - 4, audioCtx.currentTime);
                
                oscGain.gain.setValueAtTime(0.08 / frequencies.length, audioCtx.currentTime);
                
                osc.connect(oscGain);
                oscGain.connect(biquadFilter);
                oscillators.push(osc);
                osc.start();
            });

            biquadFilter.connect(masterGain);
            masterGain.connect(audioCtx.destination);
        }

        function speakVocalLine(text) {
            if (!text) return;
            window.speechSynthesis.cancel(); // Clears overlapping vocal stacks
            
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Auto-detect system voice profile targeting smooth low-mid tones
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang.startsWith("am") || v.name.includes("Google") || v.lang.startsWith("en"));
            
            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.rate = 0.82;  // Slow, measured tempo for dramatic, cinematic clarity
            utterance.pitch = 0.90; // Deepened pitch structure for professional weight
            
            window.speechSynthesis.speak(utterance);
        }

        function updateLoop() {
            if (!isRunning) return;
            const elapsed = Math.floor((audioCtx.currentTime - startTime));
            
            // Format timer clock display
            let mins = Math.floor(elapsed / 60);
            let secs = elapsed % 60;
            document.getElementById("timeClock").innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;

            // Evaluate current timestamp targets
            let activeIdx = 0;
            timeline.forEach((item) => {
                if (elapsed >= item.time) {
                    activeIdx = item.id;
                    if (!spokenLines.has(item.id) && item.text !== "") {
                        spokenLines.add(item.id);
                        speakVocalLine(item.text);
                    }
                }
            });

            // Update visual active line states
            for (let i = 0; i < 4; i++) {
                const el = document.getElementById(`line-${i}`);
                if (i === activeIdx) {
                    el.classList.add("active-cinematic");
                } else {
                    el.classList.remove("active-cinematic");
                }
            }

            // Loop termination safety check at the end of the verse segment
            if (elapsed >= 40) {
                stopEngine();
            }
        }

        function stopEngine() {
            isRunning = false;
            clearInterval(timerInterval);
            window.speechSynthesis.cancel();
            
            if (masterGain) {
                try {
                    masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
                    masterGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
                    setTimeout(() => {
                        if (audioCtx) {
                            oscillators.forEach(osc => { try { osc.stop(); } catch(e){} });
                            audioCtx.close();
                        }
                    }, 1600);
                } catch(e) {}
            }
            
            document.getElementById("timeClock").innerText = "0:00";
            for (let i = 0; i < 4; i++) {
                document.getElementById(`line-${i}`).classList.remove("active-cinematic");
            }
            spokenLines.clear();
        }

        document.getElementById("startBtn").addEventListener("click", () => {
            if (isRunning) return;
            isRunning = true;
            spokenLines.clear();
            initCinematicEngine();
            startTime = audioCtx.currentTime;
            timerInterval = setInterval(updateLoop, 250);
        });

        document.getElementById("stopBtn").addEventListener("click", () => {
            stopEngine();
        });

        // Pre-fetch browser speech engines early for seamless voice execution
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
    </script>
</body>
</html>

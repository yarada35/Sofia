<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ከወንድም በላይ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0c0c0e; 
            color: #f5f5f7; 
            text-align: center; 
            padding: 40px 20px;
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .container {
            max-width: 850px; 
            width: 100%;
            background: #16161a; 
            padding: 30px; 
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
            border: 1px solid #2a2a35; 
        }
        h1 { color: #ff9800; font-size: 2rem; margin-bottom: 5px; }
        h2 { font-size: 1.1rem; color: #8a8a9d; font-weight: normal; margin-bottom: 25px; }
        
        .controls {
            margin-bottom: 20px; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
        }
        .btn {
            background: #ff9800; border: none; padding: 14px 35px; font-size: 1.1rem;
            color: #000; font-weight: bold; cursor: pointer; border-radius: 30px;
            transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3); 
        }
        .btn:hover { background: #ffa726; transform: translateY(-2px); }
        .btn-stop { background: #3a3a4a; color: #fff; }
        
        .time-display {
            font-family: monospace; font-size: 1.2rem; color: #00e5ff;
            margin-bottom: 20px; background: #22222b; display: inline-block;
            padding: 6px 16px; border-radius: 20px; border: 1px solid #1a8a9d;
        }

        .helper-box {
            background: #1c1c24; border: 1px dashed #ff9800; padding: 14px;
            border-radius: 8px; margin-bottom: 20px; font-size: 0.95rem; color: #ffa726;
            text-align: left; line-height: 1.5;
        }

        .lyric-box {
            margin: 20px 0; display: flex; flex-direction: column; gap: 12px; text-align: left;
        }
        
        .lyric-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 18px; background: #1a1a24; border-radius: 10px;
            border: 1px solid #23232f; transition: all 0.25s ease;
        }
        .verse-text {
            font-size: 1.4rem; color: #8a8a9d; line-height: 1.6; flex-grow: 1; cursor: pointer;
        }
        
        .sync-stamp-btn {
            background: #222230; color: #00e5ff; border: 1px solid #1a8a9d;
            padding: 6px 12px; font-size: 0.85rem; border-radius: 6px; cursor: pointer;
            font-family: monospace; font-weight: bold; margin-left: 15px; min-width: 150px;
            transition: all 0.2s;
        }
        .sync-stamp-btn:hover { background: #00e5ff; color: #000; }

        .active-row { 
            background: #251f15 !important; border: 1px solid #ff9800 !important;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.15);
        }
        .active-row .verse-text { 
            color: #ff9800 !important; font-weight: bold; text-shadow: 0 0 10px rgba(255,152,0,0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ከወንድም በላይ (ታማኙ ወዳጅ)</h1>
        <h2>ምሳሌ 18፥24 • የኢትዮጵያ ፕሮቴስታንት መዝሙር ማጫወቻ</h2>
        
        <div class="controls">
            <button class="btn" id="playBtn">መዝሙሩን አጫውት (PLAY)</button>
            <button class="btn btn-stop" id="stopBtn">ቁም (STOP)</button>
        </div>
        
        <div class="time-display" id="trackTimer">የሙዚቃው ሰዓት፦ 0:00</div>
        
        <div class="helper-box">
            💡 <strong>የማመሳሰያ መመሪያ፦</strong> ሙዚቃውን ያስነሱት። ድምፃዊው እያንዳንዱን የደመቀ ስንኝ መዘመር ሲጀምር፣ ከጎኑ ያለውን ሰማያዊ <strong>[⏱️ ሰዓት መዝግብ]</strong> ቁልፍ ልክ በዚያች ቅጽበት ይጫኑት። ድረ-ገጹ ድምጹንና ፅሁፉን አንድ ላይ ያገናኛል!
        </div>
        
        <div class="lyric-box" id="lyricsContainer"></div>
    </div>

    <script>
        const audio = new Audio("mezmur.mp3");
        let isPlaying = false;

        // REAL AMHARIC LYRICS TIMELINE DATA
        const defaultTimeline = [
            { id: 0, time: 0.0, text: "🎵 [ የሙዚቃ መግቢያ (INTRO) ]" },
            
            // VERSE 1
            { id: 1, time: 6.0, text: "የሰበሰብኳቸው… በዙሪያዬ የነበሩ፤" },
            { id: 2, time: 11.0, text: "በቀን መከራዬ… ፈጥነው ተበተኑ።" },
            { id: 3, time: 16.0, text: "ሰውማ ምንድነው… ዛሬ አጅቦ ነገ የሚጠፋ፤" },
            { id: 4, time: 22.0, text: "በምድር ወዳጅ ላይ… የጣለው ልቤ ተስፋ።" },
            
            // CHORUS
            { id: 5, time: 28.0, text: "ግን ከወንድም አብልጦ… የሚጠጋጋኝ አለ፤" },
            { id: 6, time: 34.0, text: "በሞት ጥላ መካከል… አብሮኝ የቆመ ወዳጅ አለ!" },
            { id: 7, time: 40.0, text: "እርሱማ ኢየሱስ ነው… በምንም የማይለየኝ፤" },
            { id: 8, time: 46.0, text: "ሰው ሁሉ ሲተወኝ… ደረቱ ላይ ያቀፈኝ።" },
            
            // VERSE 2
            { id: 9, time: 54.0, text: "ወዳጅ ነኝ ባዮች… በደስታዬ ቀን የሳቁ፤" },
            { id: 10, time: 60.0, text: "ሲጨልምብኝ ግን… ርቀውኝ የጠፉ።" },
            { id: 11, time: 66.0, text: "የማይለወጠው… የታመነው የኔ ጌታ፤" },
            { id: 12, time: 72.0, text: "የልቤ መጠጊያ… ሆነኸኛል የነፍስ እረፍትና ደስታ።" },
            
            // BRIDGE
            { id: 13, time: 80.0, text: "አይለወጥም ፍቅሩ… አይለቅም እጄን፤" },
            { id: 14, time: 86.0, text: "እስከ አለም ፍጻሜ… አያሳፍርም ልጄን!" },
            { id: 15, time: 92.0, text: "ወዳጄ… የነፍሴ... ኢየሱስ… ህይወቴ..." }
        ];

        let lyricTimeline = JSON.parse(localStorage.getItem("sofia_timeline_v2")) || defaultTimeline;

        const lyricsContainer = document.getElementById("lyricsContainer");
        const trackTimer = document.getElementById("trackTimer");

        function formatTime(seconds) {
            let m = Math.floor(seconds / 60);
            let s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function renderInterface() {
            lyricsContainer.innerHTML = "";
            lyricTimeline.sort((a, b) => a.time - b.time);
            
            lyricTimeline.forEach((item) => {
                const row = document.createElement("div");
                row.className = "lyric-row";
                row.id = `row-${item.id}`;
                
                const txtDiv = document.createElement("div");
                txtDiv.className = "verse-text";
                txtDiv.innerHTML = item.text;
                
                txtDiv.addEventListener("click", () => {
                    audio.currentTime = item.time;
                    if (!isPlaying) playSong();
                });

                const btn = document.createElement("button");
                btn.className = "sync-stamp-btn";
                btn.innerText = `⏱️ ሰዓት መዝግብ (${formatTime(item.time)})`;
                
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    item.time = audio.currentTime;
                    localStorage.setItem("sofia_timeline_v2", JSON.stringify(lyricTimeline));
                    renderInterface();
                });

                row.appendChild(txtDiv);
                row.appendChild(btn);
                lyricsContainer.appendChild(row);
            });
        }

        audio.addEventListener("timeupdate", () => {
            const currentTime = audio.currentTime;
            trackTimer.innerText = `የሙዚቃው ሰዓት፦ ${formatTime(currentTime)}`;

            let activeId = -1;
            for (let i = 0; i < lyricTimeline.length; i++) {
                if (currentTime >= lyricTimeline[i].time) {
                    activeId = lyricTimeline[i].id;
                }
            }

            document.querySelectorAll(".lyric-row").forEach(el => {
                if (el.id === `row-${activeId}`) {
                    el.classList.add("active-row");
                } else {
                    el.classList.remove("active-row");
                }
            });
        });

        function playSong() {
            audio.play().then(() => { isPlaying = true; }).catch(err => {
                trackTimer.innerText = "ስህተት፦ mezmur.mp3 ፋይል አልተገኘም";
            });
        }

        function stopSong() {
            audio.pause(); audio.currentTime = 0; isPlaying = false;
            document.querySelectorAll(".lyric-row").forEach(el => el.classList.remove("active-row"));
        }

        document.getElementById("playBtn").addEventListener("click", playSong);
        document.getElementById("stopBtn").addEventListener("click", stopSong);

        renderInterface();
    </script>
</body>
</html>

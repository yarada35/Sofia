                ]

        function playSynthVoice(freq, startTime, duration, type = "sine", vol = 0.15) {
            if (!freq || !audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            let filter = audioCtx.createBiquadFilter();

            osc.type = type;
            osc.frequency.setValueAtTime(freq, startTime);

            filter.type = "lowpass";
            filter.frequency.setValueAtTime(type === "triangle" ? 300 : 1200, startTime);

            // Soft-attack piano and string envelopes to emulate instrument layers
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(vol, startTime + 0.03);
            gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

            osc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function triggerInstrumentalBackdrop(progKey) {
            if (!audioCtx || !songArrangement.chords[progKey]) return;
            let now = audioCtx.currentTime;
            let chord = songArrangement.chords[progKey];

            // 1. Deep 6/8 Bowed Orchestral Bass Strings
            chord.bass.forEach(p => {
                if(PITCHES[p]) playSynthVoice(PITCHES[p], now, 3.5, "triangle", 0.04);
            });

            // 2. Linear Piano Arpeggio Array Movement
            chord.arp.forEach((p, index) => {
                let noteTime = now + (index * 0.35);
                if(PITCHES[p]) playSynthVoice(PITCHES[p], noteTime, 0.6, "sine", 0.08);
            });

            // 3. Ambient Shaker Accent (Traditional 6/8 Rhythm Emulation)
            for (let i = 0; i < 6; i++) {
                let hitTime = now + (i * 0.4);
                playSynthVoice(800, hitTime, 0.03, "triangle", i % 3 == 0 ? 0.015 : 0.005);
            }
        }

        function buildSyllableInterface(sectionKey) {
            const container = document.getElementById("lyricsContainer");
            container.innerHTML = "";
            let lyricsArray = songArrangement.lyrics[sectionKey];

            lyricsArray.forEach((item, index) => {
                let span = document.createElement("span");
                span.className = "syllable";
                span.id = `syl-${index}`;
                span.innerText = item.syllable;
                container.appendChild(span);
            });
        }

        function processMasterTimelineTick() {
            if (!isPlaying) return;

            playbackTime += 0.1;
            sectionTimeElapsed += 0.1;

            // 1. Manage Global Timer Displays
            let mins = Math.floor(playbackTime / 60);
            let secs = Math.floor(playbackTime % 60);
            document.getElementById("status").innerText = `ድምፅ በማጫወት ላይ • ${mins}:${secs < 10 ? '0' : ''}${secs}`;

            let sectionKey = songArrangement.timeline[currentSectionIdx];
            let currentProgression = songArrangement.progressions[sectionKey];

            // 2. Loop Backdrops on Bar Modulo Thresholds (Every 3.5 seconds)
            if (Math.abs(sectionTimeElapsed - 0.1) < 0.01 || Math.floor(sectionTimeElapsed * 10) % 35 === 0) {
                triggerInstrumentalBackdrop(currentProgression);
            }

            // 3. Scan Syllable Progressions Natively
            let syllables = songArrangement.lyrics[sectionKey];
            let timeAccumulator = 0;
            let targetSyllableIdx = -1;

            for (let i = 0; i < syllables.length; i++) {
                let start = timeAccumulator;
                let end = timeAccumulator + syllables[i].duration;
                if (sectionTimeElapsed >= start && sectionTimeElapsed < end) {
                    targetSyllableIdx = i;
                    break;
                }
                timeAccumulator += syllables[i].duration;
            }

            // Handle Syllable Highlights and Audio Voicing Changes
            if (targetSyllableIdx !== -1 && targetSyllableIdx !== currentSyllableIdx) {
                // Clear old active styles
                let oldEl = document.getElementById(`syl-${currentSyllableIdx}`);
                if (oldEl) oldEl.classList.remove("active-syllable");

                currentSyllableIdx = targetSyllableIdx;
                let newEl = document.getElementById(`syl-${currentSyllableIdx}`);
                if (newEl) newEl.classList.add("active-syllable");

                // Execute Pitch voicings dynamically from metadata dictionaries
                let pitches = syllables[currentSyllableIdx].pitches;
                let now = audioCtx.currentTime;
                if (pitches.lead && PITCHES[pitches.lead]) {
                    // Lead Solo Melodic Voice Line
                    playSynthVoice(PITCHES[pitches.lead], now, syllables[currentSyllableIdx].duration * 0.8, "sine", 0.18);
                    
                    // Washint Woodwind Breath Overtone Layer
                    playSynthVoice(PITCHES[pitches.lead] * 1.5, now, 0.2, "sine", 0.02);
                }
                if (pitches.alto && PITCHES[pitches.alto]) {
                    // Harmonized Vocal Layer Accent Block
                    playSynthVoice(PITCHES[pitches.alto], now + 0.02, syllables[currentSyllableIdx].duration * 0.8, "sine", 0.08);
                }
            }

            // 4. Section Boundaries Checker
            if (sectionTimeElapsed >= timeAccumulator) {
                currentSectionIdx++;
                sectionTimeElapsed = 0;
                currentSyllableIdx = -1;

                if (currentSectionIdx < songArrangement.timeline.length) {
                    let nextSection = songArrangement.timeline[currentSectionIdx];
                    document.getElementById("sectionIndicator").innerText = `ከፍል፦ ${nextSection.toUpperCase()}`;
                    buildSyllableInterface(nextSection);
                } else {
                    shutdownStudioEngine();
                }
            }
        }

        function shutdownStudioEngine() {
            isPlaying = false;
            clearInterval(mainTimelineLoop);
            playbackTime = 0;
            currentSectionIdx = 0;
            currentSyllableIdx = -1;
            sectionTimeElapsed = 0;

            if (audioCtx) {
                try { audioCtx.close(); } catch(e){}
                audioCtx = null;
            }

            document.getElementById("status").innerText = "Engine Idle • 0:00";
            document.getElementById("sectionIndicator").innerText = "ከፍል፦ ዝግጁ (READY)";
            document.getElementById("lyricsContainer").innerHTML = "";

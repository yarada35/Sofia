<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ከወንድም በላይ (ታማኝ ወዳጅ) - Complete Audio Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0a0a0c; 
            color: #f5f5f7; 
            text-align: center; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            max-width: 750px; 
            width: 90%;
            background: #111115; 
            padding: 55px 35px; 
            border-radius: 24px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); 
            border: 1px solid #22222b; 
        }
        h1 {
            font-size: 2.3rem; color: #ff9800; margin: 0 0 5px 0;
        }
        h2 {
            font-size: 1.1rem; color: #717184; font-weight: normal; margin: 0 0 35px 0;
        }
        .controls {
            margin-bottom: 35px; display: flex; justify-content: center; gap: 15px;
        }
        .btn {
            background: #ff9800; border: none; padding: 15px 45px; font-size: 1.1rem;
            color: #000; font-weight: bold; cursor: pointer; border-radius: 30px;
            transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3); 
        }
        .btn:hover { background: #ffa726; transform: translateY(-2px); }
        .btn-stop { background: #252530; color: #ff9800; border: 1px solid rgba(255,152,0,0.2); box-shadow: none; }
        .btn-stop:hover { background: #323242; color: #ffa726; }
        
        .timer-display {
            font-family: monospace; font-size: 1.4rem; color: #00e5ff; margin-bottom: 35px;
            background: #181822; display: inline-block; padding: 6px 22px; border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.3); font-weight: bold;
        }

        .lyrics-container {
            display: flex; flex-direction: column; gap: 32px;
        }
        .lyric-line {
            font-size: 1.8rem; color: #353545; transition: all 0.5s ease; line-height: 1.7; font-weight: 500;
        }
        /* The exact highlight state triggered along with the audio milestones */
        .active-cinematic {
            color: #ffffff;
            font-weight: bold;
            transform: scale(1.02);
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.6), 0 0 10px rgba(255, 152, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h1>ከወንድም በላይ (ታማኝ ወዳጅ)</h1>
        <h2>የኢትዮጵያ ፕሮቴስታንት መዝሙር — ሲኒማቲክ መሣሪያ ስሪት</h2>
        
        <div class="controls">
            <button class="btn" id="startBtn">አጫውት (PLAY CINEMATIC)</button>
            <button class="btn btn-stop" id="stopBtn">ቁም (STOP)</button>
        </div>

        <div class="timer-display" id="timeClock">0:00</div>

        <div class="lyrics-container">
            <div class="lyric-line" id="line-0">🎵 [ የሙዚቃ መግቢያ (INTRO) ]</div>
            <div class="lyric-line" id="line-1">የሰበሰብኳቸው... በዙሪያዬ የነበሩ፤ በቀን መከራዬ... ፈጥነው ተበተኑ።</div>
            <div class="lyric-line" id="line-2">ሰዉማ ምንድነው... ዛሬ እጅህን ነገ የሚጠፋ፤ በምድር ወዳጅ ላይ... የጣለው ልቤ ተስፋ።</div>
            <div class="lyric-line" id="line-3">ማን ከወንድም አብልጦ... የሚጠጋኝ አለ፤ በሞት ጥላ መካከል... አብሮኝ የቆመ</div>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let masterGain = null;
        let padOscillators = [];
        let activeMelodyTimers = [];
        let startTime = 0;
        let clockInterval = null;
        let isRunning = false;
        let lastTriggeredLine = -1;

        // Custom flowing musical sequence mappings to represent the singer's vocal track phrases
        const voiceMelodies = {
            1: [293.66, 329.63, 349.23, 440.00, 392.00, 349.23], // Verse 1 notes
            2: [392.00, 440.00, 523.25, 587.33, 440.00, 392.00], // Verse 2 notes
            3: [587.33, 523.25, 440.00, 392.00, 349.23, 293.66]  // Verse 3 notes
        };

        // Strict timeline matching your exact snapshot data structural captures
        const timeline = [
            { id: 0, time: 0 },
            { id: 1, time: 6 },
            { id: 2, time: 16 },
            { id: 3, time: 26 }
        ];

        function initOrchestraEngine() {
            // Safely spawn audio context upon user click interaction to bypass browser blocking policies
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.001, audioCtx.currentTime);
            masterGain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 2.0); // Smooth background entry
            masterGain.connect(audioCtx.destination);

            // Generate an expansive space sound using an audio delay line feed
            let delayNode = audioCtx.createDelay();
            delayNode.delayTime.value = 0.5;
            let delayFeedback = audioCtx.createGain();
            delayFeedback.gain.value = 0.35;
            let delayVolume = audioCtx.createGain();
            delayVolume.gain.value = 0.25;

            delayNode.connect(delayFeedback);
            delayFeedback.connect(delayNode);
            delayNode.connect(delayVolume);
            delayVolume.connect(masterGain);

            // Synthesize a warm, evolving cinematic ambient chord cluster backdrop (D-Minor Base)
            const backdropFrequencies = [73.42, 110.00, 146.83, 174.61, 220.00];
            backdropFrequencies.forEach((freq) => {
                let osc = audioCtx.createOscillator();
                let filter = audioCtx.createBiquadFilter();
                let padGain = audioCtx.createGain();

                osc.type = "triangle"; // Smooth, analog string emulation properties
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.detune.setValueAtTime((Math.random() * 10) - 5, audioCtx.currentTime); // Chorus microtonal detune

                filter.type = "lowpass";
                filter.frequency.setValueAtTime(380, audioCtx.currentTime);

                padGain.gain.setValueAtTime(0, audioCtx.currentTime);
                padGain.gain.linearRampToValueAtTime(0.12 / backdropFrequencies.length, audioCtx.currentTime + 3.0);

                osc.connect(filter);
                filter.connect(padGain);
                padGain.connect(masterGain);
                padGain.connect(delayNode);

                osc.start();
                padOscillators.push(osc);
            });
        }

        function playVocalGuideMelody(lineId) {
            if (!voiceMelodies[lineId] || !audioCtx) return;
            let now = audioCtx.currentTime;

            // Sequentially trigger notes mimicking structural phrase timing cadences
            voiceMelodies[lineId].forEach((freq, idx) => {
                let noteStart = now + (idx * 0.55);
                let noteLen = 0.45;

                let osc = audioCtx.createOscillator();
                let voiceGain = audioCtx.createGain();
                let voiceFilter = audioCtx.createBiquadFilter();

                osc.type = "sine"; // Clean, flute-like melodic vocal core focus
                osc.frequency.setValueAtTime(freq, noteStart);
                
                // Add micro-vibrato swell dynamics over note length
                osc.frequency.linearRampToValueAtTime(freq + 3, noteStart + 0.2);
                osc.frequency.linearRampToValueAtTime(freq - 2, noteStart + 0.4);

                voiceFilter.type = "lowpass";
                voiceFilter.frequency.setValueAtTime(1000, noteStart);

                // Classical expression envelope curve modeling
                voiceGain.gain.setValueAtTime(0, noteStart);
                voiceGain.gain.linearRampToValueAtTime(0.2, noteStart + 0.08);
                voiceGain.gain.exponentialRampToValueAtTime(0.001, noteStart + noteLen);

                osc.connect(voiceFilter);
                voiceFilter.connect(voiceGain);
                voiceGain.connect(masterGain);

                osc.start(noteStart);
                osc.stop(noteStart + noteLen);
            });

            // Play a bright cinematic accent tone to mark the transition shift clearly
            let chime = audioCtx.createOscillator();
            let chimeGain = audioCtx.createGain();
            chime.type = "sine";
            chime.frequency.setValueAtTime(880, now);
            chimeGain.gain.setValueAtTime(0.06, now);
            chimeGain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
            chime.connect(chimeGain);
            chimeGain.connect(masterGain);
            chime.start(now);
            chime.stop(now + 1.0);
        }

        function engineClockTick() {
            if (!isRunning) return;
            const elapsed = Math.floor(audioCtx.currentTime - startTime);

            // Paint text updates to timer container
            let mins = Math.floor(elapsed / 60);
            let secs = elapsed % 60;
            document.getElementById("timeClock").innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;

            // Track active text intervals dynamically
            let currentLineIdx = 0;
            timeline.forEach((milestone) => {
                if (elapsed >= milestone.time) {
                    currentLineIdx = milestone.id;
                }
            });

            // Fire melodic guide signals when cross-over line boundaries transition
            if (currentLineIdx !== lastTriggeredLine) {
                lastTriggeredLine = currentLineIdx;
                if (currentLineIdx > 0) {
                    playVocalGuideMelody(currentLineIdx);
                }
            }

            // Sync visual typography emphasis layout elements flawlessly
            for (let i = 0; i < 4; i++) {
                const element = document.getElementById(`line-${i}`);
                if (i === currentLineIdx) {
                    element.classList.add("active-cinematic");
                } else {
                    element.classList.remove("active-cinematic");
                }
            }

            // Loop reset safeguard once verse segment completes completely
            if (elapsed >= 36) {
                clearOrchestraEngine();
            }
        }

        function clearOrchestraEngine() {
            isRunning = false;
            clearInterval(clockInterval);
            lastTriggeredLine = -1;

            // Immediately disconnect and wind down active synth nodes safely
            padOscillators.forEach(osc => { try { osc.stop(); } catch(e){} });
            padOscillators = [];

            if (masterGain && audioCtx) {
                try {
                    masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
                    masterGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                } catch(e){}
            }

            setTimeout(() => {
                if (audioCtx) {
                    try { audioCtx.close(); } catch(e){}
                    audioCtx = null;
                }
            }, 600);

            document.getElementById("timeClock").innerText = "0:00";
            for (let i = 0; i < 4; i++) {
                document.getElementById(`line-${i}`).classList.remove("active-cinematic");
            }
        }

        document.getElementById("startBtn").addEventListener("click", () => {
            if (isRunning) return;
            isRunning = true;
            
            initOrchestraEngine();
            startTime = audioCtx.currentTime;
            
            document.getElementById("line-0").classList.add("active-cinematic");
            clockInterval = setInterval(engineClockTick, 200);
        });

        document.getElementById("stopBtn").addEventListener("click", () => {
            clearOrchestraEngine();
        });
    </script>
</body>
</html>

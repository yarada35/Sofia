<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ከወንድም በላይ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0c0c0e; 
            color: #f5f5f7; 
            text-align: center; 
            padding: 40px 20px;
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .container {
            max-width: 800px; 
            margin: 0 auto; 
            background: #16161a; 
            padding: 30px; 
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
            border: 1px solid #2a2a35; 
        }
        h1 { 
            color: #ff9800; 
            font-size: 2rem; 
            margin-bottom: 5px; 
        }
        h2 { 
            font-size: 1.1rem; 
            color: #8a8a9d; 
            font-weight: normal; 
            margin-bottom: 30px; 
        }
        .controls {
            margin-bottom: 30px; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
        }
        .btn {
            background: #ff9800; 
            border: none; 
            padding: 14px 35px; 
            font-size: 1.1rem;
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 30px;
            transition: all 0.2s ease; 
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3); 
        }
        .btn:hover {
            background: #ffa726; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4); 
        }
        .btn-stop {
            background: #3a3a4a;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .btn-stop:hover {
            background: #4a4a5a;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        .status-badge {
            background: #22222b; 
            padding: 8px 20px; 
            border-radius: 20px;
            font-size: 0.9rem; 
            color: #00e5ff; 
            display: inline-block; 
            margin-bottom: 25px; 
            border: 1px solid #1a8a9d; 
        }
        .section-title { 
            font-size: 1.3rem; 
            color: #00e5ff; 
            margin-top: 20px; 
            font-weight: bold; 
        }
        .lyric-box {
            font-size: 1.8rem; 
            margin: 20px 0; 
            min-height: 140px; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-content: center;
            gap: 12px; 
            padding: 25px; 
            background: #1a1a24; 
            border-radius: 12px; 
            border: 1px solid #23232f; 
            line-height: 1.8;
        }
        .phrase {
            color: #5a5a6e; 
            transition: all 0.3s ease; 
            cursor: default;
        }
        .active-phrase { 
            color: #ff9800; 
            font-weight: bold; 
            text-shadow: 0 0 15px rgba(255,152,0,0.6); 
            transform: scale(1.02); 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ከወንድም በላይ (ታማኙ ወዳጅ)</h1>
        <h2>ምሳሌ 18፥24 • የኢትዮጵያ ፕሮቴስታንት 6/8 ወለባ መዝሙር</h2>
        
        <div class="controls">
            <button class="btn" id="playBtn">መዝሙሩን አጫውት (PLAY)</button>
            <button class="btn btn-stop" id="stopBtn">ቁም (STOP)</button>
        </div>
        
        <div class="status-badge" id="status">የድምፅ ማጫወቻ ዝግጁ ነው (Audio Ready)</div>
        <div class="section-title" id="sectionIndicator">ክፍል፦ ዝግጁ</div>
        
        <div class="lyric-box" id="lyricsContainer"></div>
    </div>

    <script>
        // Create a real audio element pointed directly at your uploaded repository file
        const audio = new Audio("mezmur.mp3");
        let isPlaying = false;

        // Perfect timestamp mapping for the full song (In seconds)
        // You can change these numbers to match up perfectly with the singing!
        const lyricTimeline = [
            { time: 0, section: "መግቢያ (INTRO)", text: "(የሙዚቃ መግቢያ...)" },
            { time: 5.5, section: "ስንኝ 1 (VERSE 1)", text: "የሰበሰብኳቸው… በዙሪያዬ የነበሩ፤" },
            { time: 10.5, section: "ስንኝ 1 (VERSE 1)", text: "በቀን መከራዬ… ፈጥነው ተበተኑ።" },
            { time: 15.5, section: "ስንኝ 1 (VERSE 1)", text: "ሰውማ ምንድነው… ዛሬ አጅቦ ነገ የሚጠፋ፤" },
            { time: 20.5, section: "ስንኝ 1 (VERSE 1)", text: "በምድር ወዳጅ ላይ… የጣለው ልቤ ተስፋ።" },
            
            { time: 25.5, section: "አዝማች (CHORUS)", text: "ግን ከወንድም አብልጦ… የሚጠጋጋኝ አለ፤" },
            { time: 30.5, section: "አዝማች (CHORUS)", text: "በሞት ጥላ መካከል… አብሮኝ የቆመ ወዳጅ አለ!" },
            { time: 35.5, section: "አዝማች (CHORUS)", text: "እርሱማ ኢየሱስ ነው… በምንም የማይለየኝ፤" },
            { time: 40.5, section: "አዝማች (CHORUS)", text: "ሰው ሁሉ ሲተወኝ… ደረቱ ላይ ያቀፈኝ።" },
            
            { time: 46.0, section: "ስንኝ 2 (VERSE 2)", text: "ወዳጅ ነኝ ባዮች… በደስታዬ ቀን የሳቁ፤" },
            { time: 51.0, section: "ስንኝ 2 (VERSE 2)", text: "ሲጨልምብኝ ግን… ርቀውኝ የጠፉ።" },
            { time: 56.0, section: "ስንኝ 2 (VERSE 2)", text: "የማይለወጠው… የታመነው የኔ ጌታ፤" },
            { time: 61.0, section: "ስንኝ 2 (VERSE 2)", text: "የልቤ መጠጊያ… ሆነኸኛል የነፍስ እረፍትና ደስታ።" },
            
            { time: 66.5, section: "ማሰሪያ (BRIDGE)", text: "አይለወጥም ፍቅሩ… አይለቅም እጄን፤" },
            { time: 70.5, section: "ማሰሪያ (BRIDGE)", text: "እስከ አለም ፍጻሜ… አያሳፍርም ልጄን!" },
            { time: 74.5, section: "ማሰሪያ (BRIDGE)", text: "ወዳጄ… የነፍሴ... ኢየሱስ… ህይወቴ..." },
            
            { time: 78.5, section: "አዝማች (CHORUS)", text: "ግን ከወንድም አብልጦ… የሚጠጋጋኝ አለ፤" },
            { time: 83.5, section: "አዝማች (CHORUS)", text: "በሞት ጥላ መካከል… አብሮኝ የቆመ ወዳጅ አለ!" },
            { time: 88.5, section: "አዝማች (CHORUS)", text: "እርሱማ ኢየሱስ ነው… በምንም የማይለየኝ፤" },
            { time: 93.5, section: "አዝማች (CHORUS)", text: "ሰው ሁሉ ሲተወኝ… ደረቱ ላይ ያቀፈኝ።" },
            { time: 99.0, section: "ማሳረጊያ (OUTRO)", text: "(የመጨረሻ የሙዚቃ ክፍል...)" }
        ];

        const lyricsContainer = document.getElementById("lyricsContainer");
        const sectionIndicator = document.getElementById("sectionIndicator");
        const statusBadge = document.getElementById("status");

        // Build the lyric elements on screen
        function initializeLyrics() {
            lyricsContainer.innerHTML = "";
            lyricTimeline.forEach((item, index) => {
                const span = document.createElement("div");
                span.className = "phrase";
                span.id = `line-${index}`;
                span.innerText = item.text;
                lyricsContainer.appendChild(span);
            });
        }

        // Keep updating screen values as the song naturally plays forward
        audio.addEventListener("timeupdate", () => {
            const currentTime = audio.currentTime;
            let activeIndex = 0;

            for (let i = 0; i < lyricTimeline.length; i++) {
                if (currentTime >= lyricTimeline[i].time) {
                    activeIndex = i;
                }
            }

            // Update UI elements 
            sectionIndicator.innerText = `ክፍል፦ ${lyricTimeline[activeIndex].section}`;
            
            document.querySelectorAll(".phrase").forEach((el, index) => {
                if (index === activeIndex) {
                    el.classList.add("active-phrase");
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    el.classList.remove("active-phrase");
                }
            });
        });

        function playSong() {
            audio.play().then(() => {
                isPlaying = true;
                statusBadge.innerText = "መዝሙሩ እየተጫወተ ነው (Playing Media File)";
                statusBadge.style.color = "#ff9800";
                statusBadge.style.borderColor = "#ff9800";
            }).catch(error => {
                console.log("Audio loading notice:", error);
                statusBadge.innerText = "mezmur.mp3 ን በማንበብ ላይ... እባክዎ ፋይሉን መስቀልዎን ያረጋግጡ";
            });
        }

        function stopSong() {
            audio.pause();
            audio.currentTime = 0;
            isPlaying = false;
            statusBadge.innerText = "የድምፅ ሞገዶች ቆመዋል (Engine Idle)";
            statusBadge.style.color = "#00e5ff";
            statusBadge.style.borderColor = "#1a8a9d";
            sectionIndicator.innerText = "ክፍል፦ ዝግጁ";
            document.querySelectorAll(".phrase").forEach(el => el.classList.remove("active-phrase"));
        }

        document.getElementById("playBtn").addEventListener("click", playSong);
        document.getElementById("stopBtn").addEventListener("click", stopSong);
        
        // Run immediately on page load
        initializeLyrics();
    </script>
</body>
</html>

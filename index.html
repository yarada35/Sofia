<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ከወንድም በላይ</title>
    <style>
        body { font-family: sans-serif; background: #0c0c0e; color: #f5f5f7; text-align: center; padding: 40px 20px; display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .container { max-width: 800px; margin: 0 auto; background: #16161a; padding: 30px; border-radius: 16px; border: 1px solid #2a2a35; }
        h1 { color: #ff9800; font-size: 2rem; }
        h2 { font-size: 1.1rem; color: #8a8a9d; }
        .controls { margin-bottom: 30px; display: flex; justify-content: center; gap: 15px; }
        .btn { background: #ff9800; border: none; padding: 14px 35px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 30px; color: #000; }
        .btn-stop { background: #3a3a4a; color: #fff; }
        .status-badge { background: #22222b; padding: 8px 20px; border-radius: 20px; color: #00e676; display: inline-block; margin-bottom: 25px; }
        .section-title { font-size: 1.3rem; color: #00e5ff; font-weight: bold; }
        .lyric-box { font-size: 1.8rem; margin: 20px 0; min-height: 140px; padding: 25px; background: #1a1a24; border-radius: 12px; line-height: 1.6; }
        .phrase { color: #5a5a6e; width: 100%; display: block; margin-bottom: 8px; }
        .active-phrase { color: #ff9800; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ከወንድም በላይ (ታማኙ ወዳጅ)</h1>
        <h2>ምሳሌ 18፥24 • የኢትዮጵያ ፕሮቴስታንት 6/8 ወለባ መዝሙር</h2>
        
        <div class="controls">
            <button class="btn" id="playBtn">መዝሙሩን አጫውት (PLAY)</button>
            <button class="btn btn-stop" id="stopBtn">ቁም (STOP)</button>
        </div>
        
        <div class="status-badge" id="status">የድምፅ ሞገዶች ዝግጁ ናቸው (Engine Idle)</div>
        <div class="section-title" id="sectionIndicator">ክፍል፦ መግቢያ (INTRO)</div>
        <div class="lyric-box" id="lyricsContainer"></div>
    </div>

    <script>
        let audioCtx = null, isPlaying = false, playbackTimeouts = [], activeVocalAudio = null;
        const songArrangement = {
            timeline: [
                { id: "intro", label: "መግቢያ (INTRO)", style: "ambient" },
                { id: "verse1", label: "ስንኝ 1 (VERSE 1)", style: "soft" }
            ],
            lyrics: {
                intro: [{ text: "(የባህላዊ የትዝታ ዋሽንት እና ለስላሳ ፒያኖ አርፔጆ ብቻ)", duration: 4.0, chord: "C", pitch: 60, voiceKey: null }],
                verse1: [
                    { text: "የሰበሰብኳቸው… በዙሪያዬ የነበሩ፤", duration: 5.0, chord: "C", pitch: 64, voiceKey: "line1" },
                    { text: "በቀን መከራዬ… ፈጥነው ተበተኑ።", duration: 5.0, chord: "Am", pitch: 62, voiceKey: "line2" }
                ]
            }
        };
        const vocalTracks = {
            "line1": "https://actions.google.com/sounds/v1/human/human_vocal_singing_ah.ogg",
            "line2": "https://actions.google.com/sounds/v1/human/human_vocal_singing_ah.ogg"
        };
        const CHORD_MAP = { 'C': [48, 52, 55], 'Am': [45, 48, 52] };
        function midiToFreq(note) { return 440 * Math.pow(2, (note - 69) / 12); }

        function playHumanVoiceTrack(voiceKey) {
            if (activeVocalAudio) { activeVocalAudio.pause(); activeVocalAudio = null; }
            if (!voiceKey || !vocalTracks[voiceKey]) return;
            activeVocalAudio = new Audio(vocalTracks[voiceKey]);
            activeVocalAudio.crossOrigin = "anonymous";
            activeVocalAudio.play().catch(e => console.log(e));
        }

        function playPianoArpeggio(ctx, time, notes) {
            notes.forEach((note, index) => {
                let osc = ctx.createOscillator(), gain = ctx.createGain(); osc.type = 'triangle';
                osc.frequency.setValueAtTime(midiToFreq(note + 12), time + (index * 0.15));
                gain.gain.setValueAtTime(0, time + (index * 0.15));
                gain.gain.linearRampToValueAtTime(0.07, time + (index * 0.15) + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, time + (index * 0.15) + 0.8);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(time + (index * 0.15)); osc.stop(time + (index * 0.15) + 0.8);
            });
        }

        function renderSectionLyrics(sectionId) {
            const container = document.getElementById("lyricsContainer");
            container.innerHTML = "";
            songArrangement.lyrics[sectionId].forEach((phraseData, index) => {
                let span = document.createElement("span"); span.className = "phrase";
                span.id = `phrase-${index}`; span.innerText = phraseData.text;
                container.appendChild(span);
            });
        }

        function startSongEngine() {
            if (isPlaying) return;
            isPlaying = true;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById("status").innerText = "እውነተኛ የሰው ድምፅ ማጫወቻ ዝግጁ ነው";
            
            let currentScheduleTime = audioCtx.currentTime + 0.3;
            let accumulatedDelayMs = 300; 

            songArrangement.timeline.forEach((section) => {
                const lines = songArrangement.lyrics[section.id];
                lines.forEach((line, index) => {
                    let lineDuration = line.duration;
                    if (section.style === "ambient" || section.style === "soft") {
                        playPianoArpeggio(audioCtx, currentScheduleTime, CHORD_MAP[line.chord] || [48,52,55]);
                    }

                    let t1 = setTimeout(() => {
                        document.getElementById("sectionIndicator").innerText = section.label;
                        if (index === 0) renderSectionLyrics(section.id);
                        document.querySelectorAll(".phrase").forEach(el => el.classList.remove("active-phrase"));
                        let currentLineNode = document.getElementById(`phrase-${index}`);
                        if (currentLineNode) currentLineNode.classList.add("active-phrase");
                        if (line.voiceKey) playHumanVoiceTrack(line.voiceKey);
                    }, accumulatedDelayMs);

                    playbackTimeouts.push(t1);
                    currentScheduleTime += lineDuration;
                    accumulatedDelayMs += lineDuration * 1000;
                });
            });
        }

        function stopSongEngine() {
            isPlaying = false;
            playbackTimeouts.forEach(t => clearTimeout(t)); playbackTimeouts = [];
            if (activeVocalAudio) { activeVocalAudio.pause(); activeVocalAudio = null; }
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
            document.getElementById("status").innerText = "የድምፅ ሞገዶች ቆመዋል";
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("lyricsContainer").innerHTML = `<span>መዝሙሩን ለማጫወት PLAY የሚለውን ይጫኑ...</span>`;
            document.getElementById("playBtn").addEventListener("click", startSongEngine);
            document.getElementById("stopBtn").addEventListener("click", stopSongEngine);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ከወንድም በላይ — Cinematic Choir Master Composition</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #060608; 
            color: #f5f5f7; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: #0d0d12; 
            padding: 45px 35px; 
            border-radius: 28px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); 
            border: 1px solid #1f1f2a; 
        }
        h1 { color: #ff9800; font-size: 2.4rem; margin: 0 0 8px 0; font-weight: 700; letter-spacing: 0.5px; }
        h2 { font-size: 1.1rem; color: #71718a; font-weight: normal; margin: 0 0 35px 0; }
        .controls { margin-bottom: 35px; display: flex; justify-content: center; gap: 20px; }

        .btn { 
            background: #ff9800; border: none; padding: 16px 50px; 
            font-size: 1.15rem; color: #000; font-weight: bold; cursor: pointer; 
            border-radius: 35px; transition: all 0.25s ease; 
            box-shadow: 0 4px 20px rgba(255, 152, 0, 0.3); 
        }
        .btn:hover { background: #ffa726; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 152, 0, 0.5); }
        .btn-stop { background: #1a1a24; color: #ff9800; border: 1px solid #2d2d3d; box-shadow: none; }
        .btn-stop:hover { background: #252533; color: #ffa726; }
        
        .status-badge { 
            background: #111118; padding: 10px 28px; border-radius: 25px; 
            font-size: 1rem; color: #00e5ff; display: inline-block; 
            margin-bottom: 30px; border: 1px solid rgba(0,229,255,0.2); font-family: monospace;
        }
        .section-title { 
            font-size: 1.35rem; color: #ff9800; margin-top: 20px; 
            font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; 
        }

        .lyric-box { 
            font-size: 2.4rem; margin: 30px 0; min-height: 160px; 
            display: flex; flex-wrap: wrap; justify-content: center; 
            align-content: center; gap: 16px; padding: 35px; 
            background: #12121a; border-radius: 20px; border: 1px solid #1c1c26; 
            line-height: 1.7;
        }
        .syllable { color: #3d3d52; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: default; }
        .active-syllable { 
            color: #ffffff; font-weight: bold; 
            text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 10px #ff9800; 
            transform: scale(1.15) translateY(-3px); 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ከወንድም በላይ (ታማኙ ወዳጅ)</h1>
        <h2>ምሳሌ 18፥24 • የኢትዮጵያ ፕሮቴስታንት 6/8 ወለባ መዝሙር (Cinematic Orchestra & Vocal Live Synth)</h2>
        
        <div class="controls">
            <button class="btn" id="playBtn">መዝሙሩን አጫውት (PLAY LIVE ORCHESTRA)</button>
            <button class="btn btn-stop" id="stopBtn">ቁም (STOP)</button>
        </div>
        
        <div class="status-badge" id="status">Studio Orchestrator Idle • 0:00</div>
        <div class="section-title" id="sectionIndicator">ከፍል፦ ዝግጁ (CONCERT READY)</div>
        
        <div class="lyric-box" id="lyricsContainer">
            <!-- Programmatic tracking syllables will compile here natively -->

    <script>

        // --- MASTER FREQUENCY DICTIONARY (C Major Pentatonic Tizita Framework) ---

                ],

                ],

                    { syllable: "ከ", duration: 0.4, pitches: { leadVocal: 'C5', choirHarm: 'G4' } },

                    { syllable: "በ", duration: 0.5, pitches: { leadVocal: 'A4' } },

                ],
                verse2: [
                    { syllable: "ወ", duration: 0.6, pitches: { leadVocal: 'E4' } },
                    { syllable: "ዳጅ", duration: 0.6, pitches: { leadVocal: 'G4' } },
                    { syllable: "ነኝ", duration: 0.6, pitches: { leadVocal: 'A4' } },

                    { syllable: "ዮች...", duration: 1.2, pitches: { leadVocal: 'G4' } },
                    { syllable: "በ", duration: 0.4, pitches: { leadVocal: 'E4' } },
                    { syllable: "ደ", duration: 0.6, pitches: { leadVocal: 'D4' } },
                    { syllable: "ስ", duration: 0.6, pitches: { leadVocal: 'E4' } },
                    { syllable: "ታ", duration: 0.6, pitches: { leadVocal: 'G4' } },
                    { syllable: "ዬ", duration: 0.6, pitches: { leadVocal: 'A4' } },
                    { syllable: "ቀን", duration: 0.8, pitches: { leadVocal: 'G4' } },
                    { syllable: "የ", duration: 0.4, pitches: { leadVocal: 'E4' } },
                    { syllable: "ሳ", duration: 0.8, pitches: { leadVocal: 'D4' } },
                    { syllable: "ቁ፤", duration: 1.5, pitches: { leadVocal: 'C4' } }
                ],
                bridge: [
                    { syllable: "አይ", duration: 0.5, pitches: { leadVocal: 'A4' } },
                    { syllable: "ለ", duration: 0.5, pitches: { leadVocal: 'C5' } },
                    { syllable: "ወጥ", duration: 0.5, pitches: { leadVocal: 'D5' } },
                    { syllable: "ም", duration: 0.5, pitches: { leadVocal: 'E5' } },
                    { syllable: "ፍ", duration: 0.5, pitches: { leadVocal: 'D5' } },
                    { syllable: "ቅ", duration: 0.5, pitches: { leadVocal: 'C5' } },
                    { syllable: "ሩ...", duration: 1.5, pitches: { leadVocal: 'A4' } },
                    { syllable: "አይ", duration: 0.5, pitches: { leadVocal: 'G4' } },
                    { syllable: "ለቅ", duration: 0.5, pitches: { leadVocal: 'A4' } },
                    { syllable: "ም", duration: 0.5, pitches: { leadVocal: 'C5' } },
                    { syllable: "እ", duration: 0.5, pitches: { leadVocal: 'A4' } },
                    { syllable: "ጄ", duration: 0.5, pitches: { leadVocal: 'G4' } },
                    { syllable: "ን!", duration: 1.5, pitches: { leadVocal: 'E4' } }
                ],
                chorus_rep: [
                    { syllable: "🎵 [ድግግሞሽ አዝማች — ባለ 3 ድምፅ ሙሉ የክዋየር ስብስብ]", duration: 8.0, pitches: {} }
                ],
                outro: [
                    { syllable: "🎵 [የማሳረጊያ ጸጥታ... የዋሽንትና የኦርኬስትራ ኖት ቀስ እያለ ይጠፋል]", duration: 6.0, pitches: {} }
                ]
            }
        };

        // --- ENGINE 1: LUSH CINEMATIC SYMPHONIC PAD ACOUSTICS ---
        function playCinematicOrchestraPad(freq, startTime, duration, volume = 0.04) {
            if (!freq || !audioCtx) return;
            
            // Layer 3 slightly detuned saw/triangle waves to form a massive string section ensemble
            const detunes = [-6, 0, 6];
            detunes.forEach((detuneVal) => {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                let filter = audioCtx.createBiquadFilter();

                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(freq, startTime);
                osc.detune.setValueAtTime(detuneVal, startTime);

                // Deep lowpass filter eliminates the buzz, leaving a rich orchestral warmth
                filter.type = "lowpass";
                filter.frequency.setValueAtTime(450, startTime);
                filter.frequency.exponentialRampToValueAtTime(650, startTime + duration);

                // Cinematic soft string attack envelope curves
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(volume / 3, startTime + 0.8); 
                gainNode.gain.setValueAtTime(volume / 3, startTime + duration - 0.5);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                osc.start(startTime);
                osc.stop(startTime + duration);
            });
        }

        // --- ENGINE 2: HUMAN VOCAL & CHOIR FORMANT ENGINES ---
        function playHumanVoiceSynth(freq, startTime, duration, volume = 0.16, formantType = "lead") {
            if (!freq || !audioCtx) return;

            // Base Vocal chords generator
            let primaryOsc = audioCtx.createOscillator();
            let subOsc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            
            // Human voice cords are complex; we blend triangle and square waves
            primaryOsc.type = "triangle";
            primaryOsc.frequency.setValueAtTime(freq, startTime);
            
            subOsc.type = "sawtooth";
            subOsc.frequency.setValueAtTime(freq, startTime);
            subOsc.detune.setValueAtTime(8, startTime); // Chorus widening width

            // --- VIBRATO CIRCUITRY (Emulating Vocal Cord Modulation) ---
            let vibratoLFO = audioCtx.createOscillator();
            let vibratoGain = audioCtx.createGain();
            vibratoLFO.frequency.setValueAtTime(5.8, startTime); // Human singing speed is ~5.8Hz
            vibratoGain.gain.setValueAtTime(2.5, startTime); // Pitch oscillation depth
            
            vibratoLFO.connect(vibratoGain);
            vibratoGain.connect(primaryOsc.frequency);
            vibratoGain.connect(subOsc.frequency);

            // --- FORMANT/VOWEL FILTERS (Emulating Human Chest/Throat Cavity) ---
            // An "Ah/Oh" open vocal vowel profile requires a double bandpass throat profile
            let throatFilter1 = audioCtx.createBiquadFilter();
            throatFilter1.type = "bandpass";
            throatFilter1.frequency.setValueAtTime(formantType === "lead" ? 700 : 600, startTime);
            throatFilter1.Q.setValueAtTime(6, startTime);

            let throatFilter2 = audioCtx.createBiquadFilter();
            throatFilter2.type = "bandpass";
            throatFilter2.frequency.setValueAtTime(formantType === "lead" ? 1150 : 1000, startTime);
            throatFilter2.Q.setValueAtTime(5, startTime);

            // Vocal dynamic envelope mapping
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(volume, startTime + 0.08); // Human legato vocal attack
            gainNode.gain.setValueAtTime(volume, startTime + duration - 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

            // Wire pipeline routing paths safely
            primaryOsc.connect(throatFilter1);
            subOsc.connect(throatFilter1);
            primaryOsc.connect(throatFilter2);
            subOsc.connect(throatFilter2);

            throatFilter1.connect(gainNode);
            throatFilter2.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            vibratoLFO.start(startTime);
            primaryOsc.start(startTime);
            subOsc.start(startTime);

            vibratoLFO.stop(startTime + duration);
            primaryOsc.stop(startTime + duration);
            subOsc.stop(startTime + duration);
        }

        // --- COMPOSITION ORCHESTRATION BACKDROP CONTROLLER ---
        function deployOrchestralScore(progressionKey) {
            if (!audioCtx || !songArrangement.chords[progressionKey]) return;
            let now = audioCtx.currentTime;
            let currentChord = songArrangement.chords[progressionKey];

            // 1. Unleash Deep Sub-Bass Symphony Foundation (Duration: 4.2 Seconds)
            currentChord.lowDrone.forEach(pitchKey => {
                if(PITCHES[pitchKey]) playCinematicOrchestraPad(PITCHES[pitchKey], now, 4.2, 0.05);
            });

            // 2. Weave Lush Orchestral String Ensemble Harmony Beds
            currentChord.strings.forEach(pitchKey => {
                if(PITCHES[pitchKey]) playCinematicOrchestraPad(PITCHES[pitchKey], now, 4.2, 0.03);
            });

            // 3. Emulate Ambient Woodwind Echo Shimmers
            playCinematicOrchestraPad(PITCHES[currentChord.strings[2]] * 2, now + 0.2, 1.8, 0.008);
        }

        function buildSyllableInterface(sectionKey) {
            const container = document.getElementById("lyricsContainer");
            container.innerHTML = "";
            let lyricsArray = songArrangement.lyrics[sectionKey];

            lyricsArray.forEach((item, index) => {
                let span = document.createElement("span");
                span.className = "syllable";
                span.id = `syl-${index}`;
                span.innerText = item.syllable;
                container.appendChild(span);
            });
        }

        function processMasterTimelineTick() {
            if (!isPlaying) return;

            playbackTime += 0.1;
            sectionTimeElapsed += 0.1;

            let mins = Math.floor(playbackTime / 60);
            let secs = Math.floor(playbackTime % 60);
            document.getElementById("status").innerText = `ድምፅ በማጫወት ላይ (Cinematic Live Synth) • ${mins}:${secs < 10 ? '0' : ''}${secs}`;

            let sectionKey = songArrangement.timeline[currentSectionIdx];
            let currentProgression = songArrangement.progressions[sectionKey];

            // Trigger lush pad loops every 4.0 seconds seamlessly
            if (Math.abs(sectionTimeElapsed - 0.1) < 0.01 || Math.floor(sectionTimeElapsed * 10) % 40 === 0) {
                deployOrchestralScore(currentProgression);
            }

            let syllables = songArrangement.lyrics[sectionKey];
            let timeAccumulator = 0;
            let targetSyllableIdx = -1;

            for (let i = 0; i < syllables.length; i++) {
                let start = timeAccumulator;
                let end = timeAccumulator + syllables[i].duration;
                if (sectionTimeElapsed >= start && sectionTimeElapsed < end) {
                    targetSyllableIdx = i;
                    break;
                }
                timeAccumulator += syllables[i].duration;
            }

            if (targetSyllableIdx !== -1 && targetSyllableIdx !== currentSyllableIdx) {
                let oldEl = document.getElementById(`syl-${currentSyllableIdx}`);
                if (oldEl) oldEl.classList.remove("active-syllable");

                currentSyllableIdx = targetSyllableIdx;
                let newEl = document.getElementById(`syl-${currentSyllableIdx}`);
                if (newEl) newEl.classList.add("active-syllable");

                let pitches = syllables[currentSyllableIdx].pitches;
                let now = audioCtx.currentTime;
                let durationLength = syllables[currentSyllableIdx].duration;

                // Fire human vocal tract synthesizers
                if (pitches.leadVocal && PITCHES[pitches.leadVocal]) {
                    playHumanVoiceSynth(PITCHES[pitches.leadVocal], now, durationLength * 0.92, 0.18, "lead");
                }
                if (pitches.choirHarm && PITCHES[pitches.choirHarm]) {
                    playHumanVoiceSynth(PITCHES[pitches.choirHarm], now + 0.01, durationLength * 0.90, 0.08, "harmony");
                }
            }

            if (sectionTimeElapsed >= timeAccumulator) {
                currentSectionIdx++;
                sectionTimeElapsed = 0;
                currentSyllableIdx = -1;

                if (currentSectionIdx < songArrangement.timeline.length) {
                    let nextSection = songArrangement.timeline[currentSectionIdx];
                    document.getElementById("sectionIndicator").innerText = `ከፍል፦ ${nextSection.toUpperCase()}`;
                    buildSyllableInterface(nextSection);
                } else {
                    shutdownStudioEngine();
                }
            }
        }

        function shutdownStudioEngine() {
            isPlaying = false;
            clearInterval(mainTimelineLoop);
            playbackTime = 0;
            currentSectionIdx = 0;
            currentSyllableIdx = -1;
            sectionTimeElapsed = 0;

            if (audioCtx) {
                try { audioCtx.close(); } catch(e){}
                audioCtx = null;
            }

            document.getElementById("status").innerText = "Studio Orchestrator Idle • 0:00";
            document.getElementById("sectionIndicator").innerText = "ከፍል፦ ዝግጁ (CONCERT READY)";
            document.getElementById("lyricsContainer").innerHTML = "";
        }

        document.getElementById("playBtn").addEventListener("click", () => {
            if (isPlaying) return;
            isPlaying = true;

            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContextClass();

            let firstSection = songArrangement.timeline[0];
            document.getElementById("sectionIndicator").innerText = `ከፍል፦ ${firstSection.toUpperCase()}`;
            buildSyllableInterface(firstSection);

            mainTimelineLoop = setInterval(processMasterTimelineTick, 100);
        });

        document.getElementById("stopBtn").addEventListener("click", () => {
            shutdownStudioEngine();
        });
    </script>

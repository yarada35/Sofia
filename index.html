<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የመዝሙር ማጫወቻ (Mezmur Player)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0c0c0e; 
            color: #f5f5f7; 
            text-align: center; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-card {
            max-width: 450px; 
            width: 90%;
            background: #16161a; 
            padding: 40px 30px; 
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            border: 1px solid #2a2a35; 
        }
        .audio-icon {
            font-size: 4rem;
            color: #ff9800;
            margin-bottom: 20px;
            animation: pulse 2s infinite alternate;
            display: inline-block;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.08); opacity: 1; }
        }
        h1 { color: #ffffff; font-size: 1.8rem; margin: 0 0 8px 0; }
        h2 { font-size: 1rem; color: #8a8a9d; font-weight: normal; margin: 0 0 30px 0; }
        
        /* Progress Bar Styling */
        .progress-container {
            background: #22222b;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar {
            background: #ff9800;
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.1s linear;
        }
        .time-box {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 0.9rem;
            color: #00e5ff;
            margin-bottom: 30px;
        }

        .controls {
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }
        .btn {
            background: #ff9800; border: none; padding: 16px 45px; font-size: 1.2rem;
            color: #000; font-weight: bold; cursor: pointer; border-radius: 35px;
            transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4); 
        }
        .btn:hover { background: #ffa726; transform: translateY(-2px); }
        .btn-stop { background: #3a3a4a; color: #fff; box-shadow: none; }
        .btn-stop:hover { background: #4e4e64; color: #fff; }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="audio-icon" id="visualDisc">🎵</div>
        <h1 id="titleDisplay">የቀጥታ ድምፅ ማጫወቻ</h1>
        <h2>የኢትዮጵያ ፕሮቴስታንት መዝሙር</h2>
        
        <!-- Interactive Progress Bar -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time-box">
            <span id="currentTime">0:00</span>
            <span id="durationTime">-:-</span>
        </div>
        
        <div class="controls">
            <button class="btn" id="playBtn">አጫውት (PLAY)</button>
            <button class="btn btn-stop" id="stopBtn">ቁም (STOP)</button>
        </div>
    </div>

    <script>
        const audio = new Audio("mezmur.mp3");
        const playBtn = document.getElementById("playBtn");
        const stopBtn = document.getElementById("stopBtn");
        const progressBar = document.getElementById("progressBar");
        const progressContainer = document.getElementById("progressContainer");
        const currentTimeEl = document.getElementById("currentTime");
        const durationTimeEl = document.getElementById("durationTime");
        const visualDisc = document.getElementById("visualDisc");

        function formatTime(seconds) {
            let m = Math.floor(seconds / 60);
            let s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        audio.addEventListener("timeupdate", () => {
            const current = audio.currentTime;
            const duration = audio.duration;
            
            if (duration) {
                const progressPercent = (current / duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
                durationTimeEl.innerText = formatTime(duration);
            }
            currentTimeEl.innerText = formatTime(current);
        });

        // Click on progress bar to skip anywhere in the voice track
        progressContainer.addEventListener("click", (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if (duration) {
                audio.currentTime = (clickX / width) * duration;
            }
        });

        playBtn.addEventListener("click", () => {
            audio.play().then(() => {
                visualDisc.style.animation = "pulse 0.8s infinite alternate";
            }).catch(err => {
                alert("Error: መዝሙር.mp3 አልተገኘም! Make sure your file is named exactly 'mezmur.mp3' on GitHub.");
            });
        });

        stopBtn.addEventListener("click", () => {
            audio.pause();
            audio.currentTime = 0;
            visualDisc.style.animation = "pulse 2s infinite alternate";
        });
    </script>
</body>
</html>
